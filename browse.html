<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Browse • Immortal Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/x-icon" href="assets/icon.ico">
<link rel="shortcut icon" href="assets/icon.ico">
<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }
    :root{
        --bg:#090909;
        --bg2:#111111;
        --card:#171717;
        --card2:#1d1d1d;
        --gold:#d7b56d;
        --gold2:#f0d28a;
        --text:#ececec;
        --muted:#aaaaaa;
        --border:rgba(255,255,255,.08);
    }

    html{
        scroll-behavior:smooth;
    }

    main{
        margin-top:72px;
        min-height:calc(100vh - 72px);
        display:flex;
        background:
            linear-gradient(
                to bottom,
                rgba(5,5,5,.92) 0%,
                rgba(8,8,8,.72) 18%,
                rgba(12,12,12,.55) 45%,
                rgba(8,8,8,.72) 78%,
                rgba(5,5,5,.94) 100%
            ),
            linear-gradient(
                90deg,
                rgba(5,5,5,.90) 0%,
                rgba(5,5,5,.55) 20%,
                rgba(5,5,5,.20) 50%,
                rgba(5,5,5,.55) 80%,
                rgba(5,5,5,.90) 100%
            ),
            url("assets/wp_2500x1407.jpg");

        background-size:cover;
        background-position:center;
        background-repeat:no-repeat;
    }

    body{
        background:#090909;
        color:var(--text);
        font-family:Inter,sans-serif;
    }

    body::before{
        content:"";
        position:fixed;
        inset:0;
        background:
            radial-gradient(circle at top,rgba(255,220,130,.05),transparent 35%),
            radial-gradient(circle at bottom,rgba(255,255,255,.02),transparent 40%);
        pointer-events:none;
        z-index:-2;
    }

    body::after{
        content:"";
        position:fixed;
        inset:0;
        background-image:
            radial-gradient(rgba(255,255,255,.03) 1px,transparent 1px);
        background-size:42px 42px;
        opacity:.25;
        pointer-events:none;
        z-index:-1;
    }

    nav{
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:72px;
        display:flex;
        justify-content:space-between;
        align-items:center;
        padding:0 70px;
        background:rgba(10,10,10,.82);
        backdrop-filter:blur(14px);
        border-bottom:1px solid var(--border);
        z-index:1000;
    }

    .nav-left{
        display:flex;
        gap:16px;
        align-items:center;
    }

    .nav-right{
        display:flex;
        align-items:center;
        gap:16px;
        position:relative;
    }

    .nav-btn{
        text-decoration:none;
        padding:11px 22px;
        border-radius:30px;
        color:#d7d7d7;
        transition:.25s;
        font-weight:500;
    }

    .nav-btn:hover{
        transform: translateY(-1px);
    }

    .active{
        background:#e3c16e;
        color:#000;
    }

    footer{
        padding:70px;
        text-align:center;
        border-top:2px solid rgba(255,255,255, .30);
        color:#888;
    }

    .modal{
        position:fixed;
        inset:0;
        display:flex;
        justify-content:center;
        align-items:center;
        background:rgba(0,0,0,.75);
        backdrop-filter:blur(10px);
        z-index:9999;
    }

    .hidden{
        display:none;
    }

    .modal-card{
        width:420px;
        max-width:90%;
        background:#151515;
        border:1px solid rgba(255,255,255,.08);
        border-radius:20px;
        padding:35px;
        text-align:center;
    }

    .modal-card h2{
        margin-bottom:10px;
    }

    .modal-card p{
        color:#aaa;
        margin-bottom:25px;
    }

    .admin-avatar{
        width:100%;
        height:100%;
        border-radius:50%;
        object-fit:cover;
        display:block;
    }

    .profile-btn{
        width:46px;
        height:46px;
        padding:0;
        background:transparent;
        border-radius:50%;
        overflow:visible;
        display:flex;
        justify-content:center;
        align-items:center;
        cursor:pointer;
        transition:
            transform .18s,
            box-shadow .18s,
            border-color .18s;
        border:2px solid transparent;
    }

    .profile-btn:active{
        transform:scale(.95);
    }

    .profile-avatar-wrapper,
    .profile-menu-avatar-wrapper{
        position:relative;
        overflow:visible;
        flex-shrink:0;
    }

    .profile-avatar-wrapper{
        width:100%;
        height:100%;
    }

    .profile-menu-avatar-wrapper{
        width:48px;
        height:48px;
    }

    .avatar-decoration{
        position:absolute;
        top:50%;
        left:50%;
        width:120%;
        height:120%;
        transform:translate(-50%,-50%);
        object-fit:contain;
        pointer-events:none;
        display:none;
        z-index:2;
    }

    #googleLogin:disabled{
        opacity:.6;
        cursor:not-allowed;
    }

    .icon-btn{
        width:44px;
        height:44px;
        display:flex;
        justify-content:center;
        align-items:center;
        border:none;
        background:transparent;
        color:var(--gold);
        border-radius:50%;
        cursor:pointer;
        transition:.2s;
        font-size: 24px;
    }

    .icon-btn:active{
        transform:scale(.94);
    }

    .profile-btn.hidden{
        display:none;
    }

    #closeErrorModal{
        margin-top:15px;
        width:100%;
        padding:12px;
        background:#222;
        color:white;
        border:none;
        border-radius:12px;
        font-weight:500;
        cursor:pointer;
        transition:
            background .2s,
            transform .15s,
            box-shadow .2s;
    }

    #closeErrorModal:hover{
        background:#2f2f2f;
        transform:translateY(-2px);
        box-shadow:0 8px 24px rgba(0,0,0,.35);
    }

    #closeErrorModal:active{
        transform:scale(.97);
        background:#1a1a1a;
    }

    .profile-menu{
        position:absolute;
        top:75px;
        right:65px; 
        width:260px;
        background:#181818;
        border:1px solid rgba(255,255,255,.08);
        border-radius:16px;
        overflow:hidden;
        box-shadow:0 18px 50px rgba(0,0,0,.45);
        animation:profileMenu .18s ease;
        z-index:10;
    }

    @keyframes profileMenu{
        from{
            opacity:0;
            transform:translateY(-8px);
        }
        to{
            opacity:1;
            transform:none;
        }
    }

    .profile-menu-user{
        width:100%;
        display:flex;
        align-items:center;
        gap:14px;
        padding:16px;
        background:none;
        border:none;
        border-bottom:2px solid rgba(215,181,109,.22);
        text-align:left;
        cursor:pointer;
        transition:background .18s;
    }

    .profile-menu-user:hover{
        background:rgba(255,255,255,.05);
    }

    .profile-menu-user:active{
        transform:scale(.99);
    }

    .profile-menu-avatar{
        width:48px;
        height:48px;
        border-radius:50%;
        object-fit:cover;
    }

    .profile-menu-info{
        flex:1;
        min-width:0;
        padding-right:18px;
    }

    .profile-menu-name{
        font-weight:600;
        color:white;
        white-space:nowrap;
        overflow:hidden;
        text-overflow:ellipsis;
    }

    .profile-menu-role{
        color:#999;
        font-size:13px;
        margin-top:3px;
    }

    .logout-btn{
        width:100%;
        display:flex;
        align-items:center;
        justify-content:space-between;
        padding:16px;
        background:none;
        border:none;
        color:#ff7777;
        cursor:pointer;
        transition:
            background .18s,
            color .18s,
            transform .15s;
    }

    .logout-btn span{
        font-weight:500;
    }

    .logout-btn svg{
        width:18px;
        height:18px;
        flex-shrink:0;
    }

    .logout-btn:hover{
        background:rgba(255,255,255,.05);
        color:#ff8d8d;
    }

    .logout-btn:active{
        transform:scale(.985);
    }

    .profile-btn:hover{
        transform:translateY(-2px);
        border-color:rgba(215,181,109,.55);
        box-shadow:
            0 0 22px rgba(215,181,109,.22);
    }

    .footer-link{
        text-decoration:underline;
        text-underline-offset:3px;
        transition:
            color .2s,
            opacity .2s,
            text-shadow .2s;
    }

    .privacy-link{
        color:#ff6b6b;
    }

    .privacy-link:hover{
        color:#ff9b9b;
        text-shadow:0 0 8px rgba(255,107,107,.35);
    }

    .terms-link{
        color:#6fb6ff;
    }

    .terms-link:hover{
        color:#9fd1ff;
        text-shadow:0 0 8px rgba(111,182,255,.35);
    }

    .footer-divider{
        margin:0 10px;
        color:#666;
        user-select:none;
    }

    .footer-description{
        color:#999;
        line-height:1.8;
        max-width:700px;
        margin:auto;
        font-size:16px;
    }

    .browse-panel{
        width:min(1450px,95%);
        margin:-2px auto 0;
        padding:0;
        border-radius:24px;
        display:flex;
        flex-direction:column;
        min-height:calc(100vh - 72px - 140px);
    }

    .browse-title{
        width:min(1180px,92%);
        margin:18px auto 18px;
        font-family:Cinzel,serif;
        font-size:40px;
        line-height:1;
        color:var(--gold);
        text-shadow:
            0 1px 0 rgba(0,0,0,1),
            0 2px 0 rgba(0,0,0,.95),
            0 4px 8px rgba(0,0,0,.95),
            0 10px 28px rgba(0,0,0,.85),
            0 0 12px rgba(215,181,109,.25);
    }

    .browse-search-row{
        width:min(1180px,92%);
        margin:0 auto;
        display:flex;
        align-items:center;
        gap:14px;
    }

    .browse-search-wrapper{
        flex:1;
        display:flex;
        align-items:center;
        gap:12px;
        height:50px;
        padding:0 18px;
        border-radius:14px;
        background:#1a1a1a;
        border:1px solid rgba(255,255,255,.08);
        transition:border-color .2s;
    }

    .browse-search-wrapper:focus-within{
        border-color:rgba(255,255,255,.12);
        box-shadow:
            inset 0 0 0 1px rgba(255,255,255,.03),
            0 0 0 3px rgba(255,255,255,.025);
    }

    .browse-search-icon{
        flex-shrink:0;
        color:var(--gold);
    }

    .browse-search{
        flex:1;
        height:100%;
        background:transparent;
        border:none;
        outline:none;
        color:#fff;
        font-size:15px;
    }

    .browse-search::placeholder{
        color:#8f8f8f;
    }

    .filter-btn{
        height:50px;
        padding:0 22px;
        display:flex;
        align-items:center;
        justify-content:center;
        gap:10px;
        border:none;
        border-radius:14px;
        cursor:pointer;
        background:rgba(215,181,109,.12);
        border:1px solid rgba(215,181,109,.28);
        color:var(--gold);
        font-weight:600;
        transition:.2s;
    }

    .filter-icon{
        width:20px;
        height:20px;
        display:block;
        flex-shrink:0;
        filter:
            brightness(0)
            saturate(100%)
            invert(76%)
            sepia(35%)
            saturate(679%)
            hue-rotate(356deg)
            brightness(93%)
            contrast(88%);
    }

    .reset-btn{
        height:50px;
        padding:0 26px;
        border:none;
        border-radius:14px;
        cursor:pointer;
        background:rgba(215,181,109,.25);
        border:1px solid rgba(215,181,109,.28);
        color:var(--gold);
        font-weight:700;
        transition:.2s;
    }

    .filter-btn:hover{
        background:rgba(215,181,109,.18);
    }

    .reset-btn:hover{
        background:rgba(215,181,109,.18);
    }

    .filter-btn.active{
        background:rgba(78,137,255,.16);
        border-color:rgba(78,137,255,.45);
        color:#7eb7ff;
        filter:
            brightness(0)
            saturate(100%)
            invert(68%)
            sepia(45%)
            saturate(2245%)
            hue-rotate(188deg)
            brightness(101%)
            contrast(101%);
    }

    .filter-btn.active .filter-icon{
        filter:
            brightness(0)
            saturate(100%)
            invert(68%)
            sepia(45%)
            saturate(2245%)
            hue-rotate(188deg)
            brightness(101%)
            contrast(101%);
    }

    .browse-count{
        width:min(1180px,92%);
        margin:10px auto 0;
        color:#b3b3b3;
        padding-left:8px;
        font-size:15px;
        text-shadow:
            0 1px 0 rgba(0,0,0,1),
            0 2px 0 rgba(0,0,0,.95),
            0 4px 8px rgba(0,0,0,.95),
            0 10px 28px rgba(0,0,0,.85),
            0 0 12px rgba(215,181,109,.25);
    }

    .filter-panel{
        width:min(1180px,92%);
        margin:15px auto 0;
        display:none;
        overflow:visible;
    }

    .filter-panel.open{
        display:block;
    }

    .filter-panel.open .filter-panel-inner{
        animation:filterPanelReveal .18s ease;
    }

    #filterPanel:not(.open)+.book-grid{
        margin-top:16px;
    }

    @keyframes filterPanelReveal{
        from{
            opacity:0;
            transform:translateY(-8px);
        }
        to{
            opacity:1;
            transform:none;
        }
    }

    .filter-grid{
        display:grid;
        grid-template-columns:repeat(4,minmax(0,1fr));
        gap:16px;
        padding:2px;
        margin-bottom:20px;
    }

    .filter-grid input{
        width:100%;
        height:50px;
        background:#1a1a1a;
        color:white;
        border-radius:12px;
        border:1px solid rgba(255,255,255,.08);
        padding:0 16px;
        outline:none;
    }

    .filter-grid input:focus{
        border-color:rgba(255,255,255,.12);
        box-shadow:
            inset 0 0 0 1px rgba(255,255,255,.03),
            0 0 0 3px rgba(255,255,255,.025);
    }

    .reset-btn{
        width:100%;
    }

    .filter-grid select{
        appearance:none;
        -webkit-appearance:none;
        -moz-appearance:none;
        width:100%;
        height:52px;
        background:#1a1a1a;
        color:white;
        border-radius:12px;
        border:1px solid rgba(255,255,255,.08);
        padding:0 48px 0 16px;
        outline:none;
    }

    .select-wrapper{
        position:relative;
    }

    .select-wrapper .dropdown-arrow{
        position:absolute;
        top:50%;
        right:16px;
        transform:translateY(-50%);
        pointer-events:none;
        width:18px;
        height:18px;
        color:var(--gold);
    }

    .custom-select{
        position:relative;
        width:100%;
    }

    .select-btn{
        width:100%;
        height:50px;
        background:#181818;
        border:1px solid rgba(255,255,255,.08);
        border-radius:12px;
        padding:0 18px;
        display:flex;
        justify-content:space-between;
        align-items:center;
        color:#fff;
        cursor:pointer;
        transition:.25s;
    }

    .select-btn:hover{
        border-color:rgba(215,181,109,.35);
    }

    .select-btn.open{
        border-color:rgba(255,255,255,.12);
        box-shadow:
            inset 0 0 0 1px rgba(255,255,255,.03),
            0 0 0 3px rgba(255,255,255,.025);
    }

    .select-text{
        overflow:hidden;
        white-space:nowrap;
        text-overflow:ellipsis;
    }

    .dropdown-arrow{
        width:18px;
        height:18px;
        color:var(--gold);
        transition:.25s;
    }

    .select-btn.open .dropdown-arrow{
        transform:rotate(180deg);
    }

    .dropdown-menu{
        position:absolute;
        top:calc(100% + 8px);
        left:0;
        display:grid;
        grid-auto-rows:minmax(30px,auto);
        min-width:200px;
        width:max-content;
        max-width:600px;
        max-height:320px;
        overflow-y:auto;
        overflow-x:hidden;
        padding:8px;
        background:#111111;
        border:1px solid rgba(255,255,255,.08);
        border-radius:14px;
        box-shadow:
            0 18px 50px rgba(0,0,0,.55),
            inset 0 1px rgba(255,255,255,.03);
        opacity:0;
        visibility:hidden;
        pointer-events:none;
        transform:translateY(-8px) scale(.98);
        transition:
            opacity .18s,
            transform .18s,
            visibility .18s;
        z-index:9999999999999;
        scrollbar-width:thin;
        scrollbar-color:rgba(255,255,255,.18) transparent;
    }

    .dropdown-menu::-webkit-scrollbar{
        width:7px;
    }

    .dropdown-menu::-webkit-scrollbar-track{
        background:transparent;
    }

    .dropdown-menu::-webkit-scrollbar-thumb{
        background:rgba(255,255,255,.14);
        border-radius:999px;
        border:2px solid transparent;
        background-clip:padding-box;
        transition:background .2s;
    }

    .dropdown-menu::-webkit-scrollbar-thumb:hover{
        background:rgba(255,255,255,.28);
        background-clip:padding-box;
    }

    .dropdown-menu::-webkit-scrollbar-corner{
        background:transparent;
    }

    .dropdown-menu.open{
        opacity:1;
        visibility:visible;
        pointer-events:auto;
        transform:none;
    }

    .dropdown-option{
        display:flex;
        align-items:center;
        justify-content:flex-start;
        gap:8px;
        height:30px;
        padding:0 10px;
        border-radius:8px;
        white-space:nowrap;
        cursor:pointer;
        transition:
            background .15s,
            color .15s;
        font-size:13px;
        font-weight:500;
        color:#d8d8d8;
    }

    .dropdown-option:hover{
        background:rgba(255,255,255,.045);
    }

    .dropdown-option input{
        display:none;
    }

    .dropdown-option span{
        position:relative;
        padding-left:18px;
    }

    .dropdown-option span::before{
        content:"";
        position:absolute;
        left:0;
        top:50%;
        width:9px;
        height:9px;
        border-radius:50%;
        border:1.5px solid rgba(255,255,255,.35);
        background:transparent;
        transform:translateY(-50%);
        transition:
            background .18s,
            border-color .18s,
            box-shadow .18s;
    }

    .dropdown-option.positive span::before{
        background:var(--gold);
        border-color:var(--gold);
        box-shadow:0 0 8px rgba(215,181,109,.45);
    }

    .dropdown-option.negative span::before{
        background:#4400ff;
        border-color:#000000;
        box-shadow:0 0 8px rgba(9, 65, 139, 0.35);
    }

    .dropdown-menu.grid{
        grid-template-columns:repeat(3,max-content);
        column-gap:22px;
        row-gap:2px;
        width:max-content;
        min-width:400px;
        max-width:600px;
    }

    .author-dropdown{
        width:300px;
        padding:10px;
    }

    .author-search{
        width:100%;
        height:38px;
        padding:0 12px;
        background:#191919;
        color:#fff;
        border:1px solid rgba(255,255,255,.08);
        border-radius:10px;
        outline:none;
        font-size:13px;
    }

    .author-search:focus{
        border-color:rgba(255,255,255,.12);
        box-shadow:
            inset 0 0 0 1px rgba(255,255,255,.03),
            0 0 0 3px rgba(255,255,255,.025);
    }

    .author-search-wrapper{
        position:relative;
    }

    .author-search{
        padding-right:36px;
    }

    .author-search-clear{
        position:absolute;
        top:50%;
        right:8px;
        transform:translateY(-50%);
        width:22px;
        height:22px;
        border:none;
        border-radius:50%;
        background:transparent;
        color:#888;
        font-size:18px;
        line-height:1;
        cursor:pointer;
        display:none;
        transition:.15s;
    }

    .author-search-clear:hover{
        color:#fff;
        background:rgba(255,255,255,.08);
    }

    .author-search-clear.show{
        display:flex;
        align-items:center;
        justify-content:center;
    }

    .author-results{
        margin-top:8px;
        display:flex;
        flex-direction:column;
    }

    .author-item{
        height:34px;
        display:flex;
        align-items:center;
        padding:0 10px;
        border-radius:8px;
        cursor:pointer;
        font-size:13px;
        color:#ddd;
        transition:.15s;
    }

    .author-item:hover{
        background:rgba(255,255,255,.05);
    }

    .author-empty{
        padding:10px;
        color:#777;
        font-size:12px;
        text-align:center;
    }

    .filter-btn{
        padding:0 18px;
    }

    .reset-btn{
        padding:0 22px;
    }

    .select-btn{
        padding:0 15px;
    }

    .browse-search{
        font-size:14px;
    }

    .select-text{
        font-size:14px;
    }

    .book-grid{
        width:min(1180px,92%);
        margin:0 auto;
        display:grid;
        grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
        gap:26px 20px;
        flex:1;
        align-content:start;
        min-height:calc(3 * (140px * 4 / 3) + 2 * 26px);
    }

    .book-cover{
        aspect-ratio:3/4;
        width:100%;
        object-fit:cover;
        border-radius:14px;
        background:#151515;
        border:1px solid rgba(255,255,255,.08);
        opacity:0;
        transition:
            opacity .18s,
            transform .18s,
            box-shadow .18s;
    }

    .book-card{

    import { auth, db } from "./src/firebase";

    } from "firebase/firestore";

    const closeErrorModal=document.getElementById("closeErrorModal");

    const menuAvatar=document.getElementById("menuAvatar");
    const menuName=document.getElementById("menuName");
    const menuRole=document.getElementById("menuRole");
    const profilePageBtn=document.getElementById("profilePageBtn");
    const logoutBtn=document.getElementById("logoutBtn");
    const filterBtn = document.getElementById("filterBtn");
    const filterPanel = document.getElementById("filterPanel");
    const resetFilters=document.getElementById("resetFilters");
    const titleCount=document.getElementById("titleCount");
    const bookGrid=document.getElementById("bookGrid");
    const browseSearch=document.getElementById("browseSearch");
    const pagination=document.getElementById("pagination");
    const mobileSheetOverlay=document.getElementById("mobileSheetOverlay");
    const mobileSheet=document.querySelector(".mobile-sheet");
    const mobileSheetBody=document.getElementById("mobileSheetBody");
    const mobileSheetTitle=document.getElementById("mobileSheetTitle");
    const mobileSheetClose=document.getElementById("mobileSheetClose");
    const navAvatar=document.getElementById("navAvatar");
    const navDecoration=document.getElementById("navDecoration");
    const menuDecoration=document.getElementById("menuDecoration");

    const params = new URLSearchParams(window.location.search);
    const searchQuery = params.get("query");

    if (searchQuery) {
        browseSearch.value = decodeURIComponent(searchQuery.replace(/\+/g, " "));

        history.replaceState(
            {},
            "",
            window.location.pathname
        );
    }

    let currentMobileMenu=null;
    let currentMobileParent=null;
    let currentPage=1;
    let activeRenderId=0;
    let lastBooksPerPage=booksPerPage();
    const selectRegistry={};
    const filterState={};

    function readMenuState(menu){
        return {
            positive:[...menu.querySelectorAll(".dropdown-option.positive input")]
                .map(input=>input.value),
            negative:[...menu.querySelectorAll(".dropdown-option.negative input")]
                .map(input=>input.value)
        };
    }

    function syncFilterState(placeholder,menu){
        filterState[placeholder]=readMenuState(menu);
    }

    function getFilterState(placeholder){
        return filterState[placeholder]||{
            positive:[],
            negative:[]
        };
    }

    function updateSelectText(placeholder){
        const config=selectRegistry[placeholder];
        if(!config){
            return;
        }
        const state=getFilterState(placeholder);
        const positives=state.positive.length;
        const negatives=state.negative.length;
        if(positives===0 && negatives===0){
            config.text.textContent=placeholder;
            return;
        }
        if(config.allowNegative){
            config.text.textContent=`${positives}+ ${negatives}-`;
            return;
        }
        const selectedValue=state.positive[0];
        const selectedInput=[...config.menu.querySelectorAll(".dropdown-option input")]
            .find(input=>input.value===selectedValue);
        config.text.textContent=selectedInput
            ? selectedInput.closest(".dropdown-option").textContent.trim()
            : placeholder;
    }

    function closeOpenSelects(exceptPlaceholder=null){
        Object.entries(selectRegistry).forEach(([placeholder,config])=>{
            if(placeholder===exceptPlaceholder){
                return;
            }
            config.menu.classList.remove("open");
            config.btn.classList.remove("open");
        });
    }

    function restoreCurrentMobileMenu(){
        if(!currentMobileMenu||!currentMobileParent){
            return;
        }
        currentMobileMenu.classList.remove("open");
        if(mobileSheetBody.contains(currentMobileMenu)){
            mobileSheetBody.innerHTML="";
        }
        currentMobileParent.appendChild(currentMobileMenu);
        currentMobileMenu=null;
        currentMobileParent=null;
    }

    function openMobileSheet(title,menu){
        if(currentMobileMenu&&currentMobileMenu!==menu){
            restoreCurrentMobileMenu();
        }
        currentMobileMenu=menu;
        currentMobileParent=menu.parentNode;
        mobileSheetTitle.textContent=title;
        mobileSheetBody.innerHTML="";
        mobileSheetBody.appendChild(menu);
        menu.scrollTop=0;
        menu.classList.add("open");
        mobileSheetOverlay.classList.add("open");
        document.body.style.overflow="hidden";
    }

    function closeMobileSheet(){
        if(!currentMobileMenu) return;
        mobileSheetOverlay.classList.remove("open");
        closeOpenSelects();
        restoreCurrentMobileMenu();
        document.body.style.overflow="";
    }

    mobileSheetClose.onclick=closeMobileSheet;

    mobileSheetOverlay.addEventListener("click",(e)=>{
        if(e.target!==mobileSheetOverlay){
            return;
        }
        closeMobileSheet();
    });

    function booksPerPage(){
        return window.innerWidth<=900 ? 6 : 12;
    }

    filterBtn.addEventListener("click", () => {
        filterPanel.classList.toggle("open");
        filterBtn.classList.toggle("active");
    });

    const authorSearch=document.getElementById("authorSearch");
    const authors=document.getElementById("authors");
    const clearAuthorSearch=document.getElementById("clearAuthorSearch");

    const authorNames=[];
    let selectedAuthor="";

    authorSearch?.addEventListener("input",()=>{
        clearAuthorSearch.classList.toggle(
            "show",
            authorSearch.value.length>0
        );
        const q=authorSearch.value.trim().toLowerCase();
        authors.innerHTML="";
        const results=authorNames
            .filter(a=>a.toLowerCase().includes(q))
            .slice(0,5);
        if(results.length===0){
            authors.innerHTML=`
                <div class="author-empty">
                    No Authors Found
                </div>
            `;
            return;
        }
        results.forEach(name=>{
            authors.insertAdjacentHTML(
                "beforeend",
                `
                <div class="author-item">
                    ${name}
                </div>
                `
            );
        });
    });

    authors.addEventListener("click",(e)=>{
        const chip=e.target.closest(".author-item");
        if(!chip) return;
        selectedAuthor=chip.textContent.trim();
        authorSearch.value=selectedAuthor;
        clearAuthorSearch.classList.add("show");
        authors.innerHTML="";
        currentPage=1;
        renderBrowse();
    });

    authorSearch?.addEventListener("click",(e)=>{
        e.stopPropagation();
    });

    authorSearch?.addEventListener("keydown",(e)=>{
        e.stopPropagation();
    });

    clearAuthorSearch.onclick=()=>{
        authorSearch.value="";
        clearAuthorSearch.classList.remove("show");
        selectedAuthor="";
        authors.innerHTML="";
        currentPage=1;
        renderBrowse();
        authorSearch.focus();
    };
    
    document.querySelectorAll(".custom-select").forEach(select=>{
        const btn=select.querySelector(".select-btn");
        const menu=select.querySelector(".dropdown-menu");
        menu.addEventListener("click",(e)=>{
            e.stopPropagation();
        });
        const text=select.querySelector(".select-text");
        const placeholder=select.dataset.placeholder;
        const allowNegative=select.dataset.placeholder!=="Sort By";
        selectRegistry[placeholder]={
            btn,
            menu,
            text,
            allowNegative
        };
        syncFilterState(placeholder,menu);
        btn.addEventListener("click",(e)=>{
            e.stopPropagation();
            closeOpenSelects(placeholder);
            if(window.innerWidth<=900){
                if(currentMobileMenu===menu){
                    closeMobileSheet();
                    return;
                }
                btn.classList.add("open");
                openMobileSheet(
                    placeholder,
                    menu
                );
                return;
            }
            menu.classList.toggle("open");
            btn.classList.toggle("open");
        });
        menu.querySelectorAll(".dropdown-option").forEach(option=>{
            option.dataset.state="0";
            option.onclick=(e)=>{
                e.preventDefault();
                e.stopPropagation();
                let state=Number(option.dataset.state);
                if(allowNegative){
                    state=(state+1)%3;
                }else{
                    menu.querySelectorAll(".dropdown-option").forEach(o=>{
                        o.dataset.state="0";
                        o.classList.remove("positive","negative");
                    });
                    state=state===1 ? 0 : 1;
                }
                option.dataset.state=state;
                option.classList.remove("positive","negative");
                if(state===1){
                    option.classList.add("positive");
                }else if(state===2){
                    option.classList.add("negative");
                }
                syncFilterState(placeholder,menu);
                updateSelectText(placeholder);
                currentPage=1;
                renderBrowse();
            };
        });
    });

    document.addEventListener("click",(e)=>{
        if(window.innerWidth<=900){
            return;
        }
        if(e.target.closest(".custom-select")){
            return;
        }
        closeOpenSelects();
    });

    let ignoreScrollUntil = 0;

    function showLoggedIn(profile,isOwner){
        profileBtn.classList.remove("hidden");
        navAvatar.src = profile.avatar;
        menuAvatar.src = profile.avatar;
        if(profile.decoration){
            navDecoration.src = profile.decoration;
            navDecoration.style.display = "block";

            menuDecoration.src = profile.decoration;
            menuDecoration.style.display = "block";
        }else{
            navDecoration.style.display = "none";
            menuDecoration.style.display = "none";
        }
        menuName.textContent = profile.displayName;
        menuRole.textContent = isOwner ? "Owner" : "Administrator";
    }
   
    async function getBrowseData(){
        try{
            const cached = localStorage.getItem("metadata");
            if(cached){
                const metadata = JSON.parse(cached);
                if(metadata?.browse){
                    return metadata.browse;
                }
            }
        }catch(err){
            console.warn("Invalid cached metadata. Fetching again...");
            localStorage.removeItem("metadata");
        }
        try{
            const metadataDoc = await getDoc(
                doc(db,"epubs","metadata")
            );
            if(!metadataDoc.exists()){
                return null;
            }
            const metadata = metadataDoc.data();
            localStorage.setItem(
                "metadata",
                JSON.stringify(metadata)
            );
            return metadata.browse || null;
        }catch(err){
            console.error("Failed to load metadata:",err);
            return null;
        }
    }

    function getSearchScore(book, query){
        if(!query) return 999999;
        query=query.toLowerCase().trim();
        const title=(book.bookName||"").toLowerCase();
        const alternateTitles=Array.isArray(book.alternateTitles)
            ? book.alternateTitles.map(t=>t.toLowerCase())
            : [];
        if(title===query) return 0;
        if(title.startsWith(query)) return 1;
        if(title.includes(query)) return 2;
        for(const alt of alternateTitles){
            if(alt===query) return 3;
        }
        for(const alt of alternateTitles){
            if(alt.startsWith(query)) return 4;
        }
        for(const alt of alternateTitles){
            if(alt.includes(query)) return 5;
        }
        return 999999;
    }

    function getSelectedValues(placeholder){
        const state=getFilterState(placeholder);
        return {
            positive:state.positive.map(value=>value.toLowerCase()),
            negative:state.negative.map(value=>value.toLowerCase())
        };
    }

    function matchesGenre(book,value){
        if((book.mainGenre||"").toLowerCase()===value){
            return 3;
        }
        if(
            Array.isArray(book.genres)
            &&
            book.genres.some(g=>g.toLowerCase()===value)
        ){
            return 2;
        }
        if(
            Array.isArray(book.tags)
            &&
            book.tags.some(t=>t.toLowerCase()===value)
        ){
            return 1;
        }
        return 0;
    }

    function applyFilters(books){
        const type=getSelectedValues("Type");
        const genre=getSelectedValues("Genre");
        const origin=getSelectedValues("Origin");
        const status=getSelectedValues("Status");
        const language=getSelectedValues("Language");
        return books
            .map(book=>{
                let genrePriority=0;
                // TYPE
                if(type.positive.length){
                    if(!type.positive.includes((book.category||"").toLowerCase())){
                        return null;
                    }
                }
                if(type.negative.includes((book.category||"").toLowerCase())){
                    return null;
                }
                // STATUS
                if(status.positive.length){
                    if(!status.positive.includes((book.status||"").toLowerCase())){
                        return null;
                    }
                }
                if(status.negative.includes((book.status||"").toLowerCase())){
                    return null;
                }
                // ORIGIN
                if(origin.positive.length){
                    if(!origin.positive.includes((book.origin||"").toLowerCase())){
                        return null;
                    }
                }
                if(origin.negative.includes((book.origin||"").toLowerCase())){
                    return null;
                }
                // LANGUAGE
                if(language.positive.length){
                    if(!language.positive.includes((book.language||"").toLowerCase())){
                        return null;
                    }
                }
                if(language.negative.includes((book.language||"").toLowerCase())){
                    return null;
                }
                // GENRE
                if(genre.positive.length){
                    let best=0;
                    for(const g of genre.positive){
                        best=Math.max(
                            best,
                            matchesGenre(book,g)
                        );
                    }
                    if(best===0){
                        return null;
                    }
                    genrePriority=best;
                }
                if(
                    genre.negative.some(g=>matchesGenre(book,g))
                ){
                    return null;
                }
                if(
                    selectedAuthor &&
                    book.authorName!==selectedAuthor
                ){
                    return null;
                }
                book.__genrePriority=genrePriority;
                return book;
            })
            .filter(Boolean);
    }

    function getSortMode(){
        return getFilterState("Sort By").positive[0]||"A-Z";
    }

    async function renderBrowse(){
        const renderId=++activeRenderId;
        const browse=await getBrowseData();
        if(renderId!==activeRenderId){
            return;
        }
        if(!browse){
            titleCount.textContent = "0 Titles";
            bookGrid.innerHTML = `
                <div class="no-results">
                    NO BOOKS AVAILABLE
                </div>
            `;
            pagination.innerHTML = "";
            return;
        }
        const query=browseSearch.value.trim().toLowerCase();
        let books=Object.values(browse)
            .filter(book=>typeof book==="object");
        authorNames.length=0;
        books.forEach(book=>{
            if(
                book.authorName &&
                !authorNames.includes(book.authorName)
            ){
                authorNames.push(book.authorName);
            }
        });
        authorNames.sort((a,b)=>a.localeCompare(b));
        books=applyFilters(books);
        if(query){
            books=books.filter(book=>{
                const title=(book.bookName||"").toLowerCase();
                if(title.includes(query)){
                    return true;
                }
                return Array.isArray(book.alternateTitles)
                    &&
                    book.alternateTitles.some(alt=>
                        alt.toLowerCase().includes(query)
                    );
            });
        }
        const sortMode=getSortMode();
        books.sort((a,b)=>{
            if(a.__genrePriority!==b.__genrePriority){
                return b.__genrePriority-a.__genrePriority;
            }
            switch(sortMode){
                case "Z-A":
                    return b.bookName.localeCompare(
                        a.bookName,
                        undefined,
                        { sensitivity:"base" }
                    );
                case "Most Chapters":
                    return (Number(b.chapterNumber) || 0) - (Number(a.chapterNumber) || 0);
                case "Least Chapters":
                    return (Number(a.chapterNumber) || 0) - (Number(b.chapterNumber) || 0);
                default:
                    return a.bookName.localeCompare(
                        b.bookName,
                        undefined,
                        { sensitivity:"base" }
                    );
            }
        });
        titleCount.textContent=`${books.length} ${books.length===1?"Title":"Titles"}`;
        if(books.length===0){
            bookGrid.innerHTML=`
                <div class="no-results">
                    NO RESULTS
                </div>
            `;
            pagination.innerHTML="";
            return;
        }
        const perPage=booksPerPage();
        lastBooksPerPage=perPage;
        const totalPages=Math.ceil(books.length/perPage);
        currentPage=Math.min(currentPage,totalPages);
        const start=(currentPage-1)*perPage;
        const end=start+perPage;
        const visibleBooks=books.slice(start,end);
        if(renderId!==activeRenderId){
            return;
        }
        bookGrid.innerHTML = "";
        const coverQueue=[];
        for (const book of visibleBooks) {
            const card = document.createElement("div");
            card.className = "book-card";
            card.onclick = () => {
                location.href = `/book?id=${encodeURIComponent(book.bookId)}`;
            };
            const img = document.createElement("img");
            img.className = "book-cover";
            img.loading = "lazy";
            img.draggable = false;
            img.src = "assets/cover-placeholder.jpg";
            img.style.opacity = "1";
            const title = document.createElement("div");
            title.className = "book-title";
            title.textContent = book.bookName;
            card.appendChild(img);
            card.appendChild(title);
            bookGrid.appendChild(card);
            coverQueue.push({
                book,
                img
            });
        }
        renderPagination(totalPages);
        for (const { book, img } of coverQueue) {
            if(renderId!==activeRenderId){
                return;
            }
            try {
                const loader = new Image();
                loader.src = book.coverUrl;
                await loader.decode();
                if(renderId!==activeRenderId || !img.isConnected){
                    return;
                }
                img.src = book.coverUrl;
            } catch {
                if(renderId!==activeRenderId || !img.isConnected){
                    return;
                }
            }
        }
    }

    function renderPagination(totalPages){
        pagination.innerHTML="";
        if(totalPages<=1) return;
        if(currentPage>1){
            pagination.insertAdjacentHTML(
                "beforeend",
                `<button class="page-btn arrow" data-page="1">&lt;</button>`
            );
        }
        let start=Math.max(1,currentPage-2);
        let end=Math.min(totalPages,start+4);
        start=Math.max(1,end-4);
        for(let i=start;i<=end;i++){
            pagination.insertAdjacentHTML(
                "beforeend",
                `
                <button
                    class="page-btn ${i===currentPage?"active":""}"
                    data-page="${i}">
                    ${i}
                </button>
                `
            );
        }
        if(currentPage<totalPages){
            pagination.insertAdjacentHTML(
                "beforeend",
                `<button class="page-btn arrow" data-page="${totalPages}">&gt;</button>`
            );
        }
        pagination.querySelectorAll(".page-btn").forEach(btn=>{
            btn.onclick=()=>{
                currentPage=Number(btn.dataset.page);
                renderBrowse();
                window.scrollTo({
                    top:0,
                    behavior:"smooth"
                });
            };
        });
    }

    onAuthStateChanged(auth, async (user) => {
        try{
            if(!user){
                profileBtn.classList.add("hidden");
                navAvatar.removeAttribute("src");
                menuAvatar.removeAttribute("src");
                navDecoration.style.display = "none";
                menuDecoration.style.display = "none";
                profileMenu.classList.add("hidden");
                return;
            }
            const adminDoc = await getDoc(
                doc(db, "admins", user.email.toLowerCase())
            );
            if(!adminDoc.exists()){
                await signOut(auth);
                profileBtn.classList.add("hidden");
                navAvatar.removeAttribute("src");
                menuAvatar.removeAttribute("src");
                navDecoration.style.display = "none";
                menuDecoration.style.display = "none";
                profileMenu.classList.add("hidden");
                return;
            }
            const profileDoc = await getDoc(
                doc(db, "userdata", user.uid)
            );
            if(!profileDoc.exists()){
                throw new Error("User profile not found.");
            }
            showLoggedIn(
                profileDoc.data(),
                adminDoc.data().owner === true
            );
        }
        catch(err){
            console.error(err);
        }
    });

    profileBtn.onclick = (e) => {
        e.stopPropagation();
        const openMenu = () => {
            ignoreScrollUntil = Date.now() + 400;
            profileMenu.classList.remove("hidden");
        };
        if (window.scrollY > 30) {
            window.scrollTo({
                top: 0,
                behavior: "smooth"
            });
            const waitForTop = () => {
                if (window.scrollY <= 5) {
                    openMenu();
                } else {
                    requestAnimationFrame(waitForTop);
                }
            };
            requestAnimationFrame(waitForTop);
        } else {
            profileMenu.classList.toggle("hidden");
        }
    };

    document.addEventListener("click",(e)=>{
        if(
            !profileMenu.contains(e.target)
            &&
            !profileBtn.contains(e.target)
        ){
            profileMenu.classList.add("hidden");
        }
    });

    window.addEventListener("scroll", () => {
        if (Date.now() < ignoreScrollUntil) return;
        if (!profileMenu.classList.contains("hidden")) {
            profileMenu.classList.add("hidden");
        }
    });

    logoutBtn.onclick=async()=>{
        profileMenu.classList.add("hidden");
        await signOut(auth);
    };

    profilePageBtn.onclick=()=>{
        window.location.href="/profile";
    };

    resetFilters.onclick=()=>{
        document.querySelectorAll(".dropdown-option").forEach(option=>{
            option.dataset.state="0";
            option.classList.remove(
                "positive",
                "negative"
            );
        });
        Object.keys(selectRegistry).forEach(placeholder=>{
            filterState[placeholder]={
                positive:[],
                negative:[]
            };
            updateSelectText(placeholder);
        });
        authorSearch.value="";
        authors.innerHTML="";
        browseSearch.value="";
        selectedAuthor = "";
        currentPage=1;
        renderBrowse();
    };

    menuBtn.onclick = () => {
        window.location.href = "/index";
    };

    browseSearch.addEventListener("input",()=>{
        currentPage=1;
        renderBrowse();
    });
    window.addEventListener("resize",()=>{
        const nextPerPage=booksPerPage();
        if(nextPerPage===lastBooksPerPage){
            return;
        }
        const firstVisibleIndex=(currentPage-1)*lastBooksPerPage;
        currentPage=Math.floor(firstVisibleIndex/nextPerPage)+1;
        lastBooksPerPage=nextPerPage;
        renderBrowse();
    });
    renderBrowse();

</script>

</body>
</html>
