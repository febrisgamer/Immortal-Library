<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@300;400;500;600;700&family=Noto+Serif:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" type="image/x-icon" href="assets/icon.ico">
<link rel="shortcut icon" href="assets/icon.ico">
<style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    :root{
        --bg:#090909;
        --bg2:#111111;
        --card:#171717;
        --card2:#1d1d1d;
        --gold:#d7b56d;
        --gold2:#f0d28a;
        --text:#ececec;
        --muted:#aaaaaa;
        --border:rgba(255,255,255,.08);
    }

    html{
        scroll-behavior:smooth;
    }

    main{
        position:relative;
        isolation:isolate;
        margin-top:72px;
        min-height:calc(100vh - 72px);
        padding:70px 0;
        background:
            radial-gradient(
                circle at 50% -5%,
                rgba(215,181,109,.16) 0%,
                rgba(215,181,109,.08) 20%,
                transparent 45%
            ),
            radial-gradient(
                circle at 85% 15%,
                rgba(120,160,255,.05) 0%,
                transparent 35%
            ),
            linear-gradient(
                to bottom,
                #16110a 0%,
                #111111 18%,
                #0d0d0d 45%,
                #090909 75%,
                #060606 100%
            );
    }

    body{
        background:#090909;
        color:var(--text);
        font-family:Inter,sans-serif;
    }

    body::before{
        content:"";
        position:fixed;
        inset:0;
        background:
            radial-gradient(circle at top,rgba(255,220,130,.05),transparent 35%),
            radial-gradient(circle at bottom,rgba(255,255,255,.02),transparent 40%);
        pointer-events:none;
        z-index:-2;
    }

    body::after{
        content:"";
        position:fixed;
        inset:0;
        background-image:
            radial-gradient(rgba(255,255,255,.03) 1px,transparent 1px);
        background-size:42px 42px;
        opacity:.25;
        pointer-events:none;
        z-index:-1;
    }

    nav{
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:72px;
        display:flex;
        justify-content:space-between;
        align-items:center;
        padding:0 70px;
        background:rgba(10,10,10,.82);
        backdrop-filter:blur(14px);
        border-bottom:1px solid var(--border);
        z-index:1000;
    }

    .nav-left{
        display:flex;
        gap:16px;
        align-items:center;
    }

    .nav-right{
        display:flex;
        align-items:center;
        gap:16px;
        position:relative;
    }

    .nav-btn{
        text-decoration:none;
        padding:11px 22px;
        border-radius:30px;
        color:#d7d7d7;
        transition:.25s;
        font-weight:500;
    }

    .nav-btn:hover{
        transform: translateY(-1px);
    }

    .active{
        background:#e3c16e !important;
        color:#000 !important;
    }

    footer{
        padding:70px;
        text-align:center;
        border-top:2px solid rgba(255,255,255, .30);
        color:#888;
    }

    .modal{
        position:fixed;
        inset:0;
        display:flex;
        justify-content:center;
        align-items:center;
        background:rgba(0,0,0,.75);
        backdrop-filter:blur(10px);
        z-index:9999;
    }

    .hidden{
        display:none;
    }

    .modal-card{
        width:420px;
        max-width:90%;
        background:#151515;
        border:1px solid rgba(255,255,255,.08);
        border-radius:20px;
        padding:35px;
        text-align:center;
    }

    .modal-card h2{
        margin-bottom:10px;
    }

    .modal-card p{
        color:#aaa;
        margin-bottom:25px;
    }

    .admin-avatar{
        width:100%;
        height:100%;
        border-radius:50%;
        object-fit:cover;
        display:block;
    }

    .profile-btn{
        width:46px;
        height:46px;
        padding:0;
        background:transparent;
        border-radius:50%;
        overflow:hidden;
        display:flex;
        justify-content:center;
        align-items:center;
        cursor:pointer;
        transition:
            transform .18s,
            box-shadow .18s,
            border-color .18s;
        border:2px solid transparent;
    }

    .profile-btn:active{
        transform:scale(.95);
    }

    #googleLogin:disabled{
        opacity:.6;
        cursor:not-allowed;
    }

    .icon-btn{
        width:44px;
        height:44px;
        display:flex;
        justify-content:center;
        align-items:center;
        border:none;
        background:transparent;
        color:var(--gold);
        border-radius:50%;
        cursor:pointer;
        transition:.2s;
        font-size: 24px;
    }

    .icon-btn:active{
        transform:scale(.94);
    }

    .profile-btn.hidden{
        display:none;
    }

    #closeErrorModal{
        margin-top:15px;
        width:100%;
        padding:12px;
        background:#222;
        color:white;
        border:none;
        border-radius:12px;
        font-weight:500;
        cursor:pointer;
        transition:
            background .2s,
            transform .15s,
            box-shadow .2s;
    }

    #closeErrorModal:hover{
        background:#2f2f2f;
        transform:translateY(-2px);
        box-shadow:0 8px 24px rgba(0,0,0,.35);
    }

    #closeErrorModal:active{
        transform:scale(.97);
        background:#1a1a1a;
    }

    .profile-menu{
        position:absolute;
        top:75px;
        right:65px; 
        width:260px;
        background:#181818;
        border:1px solid rgba(255,255,255,.08);
        border-radius:16px;
        overflow:hidden;
        box-shadow:0 18px 50px rgba(0,0,0,.45);
        animation:profileMenu .18s ease;
        z-index:10;
    }

    @keyframes profileMenu{
        from{
            opacity:0;
            transform:translateY(-8px);
        }
        to{
            opacity:1;
            transform:none;
        }
    }

    .profile-menu-user{
        width:100%;
        display:flex;
        align-items:center;
        gap:14px;
        padding:16px;
        background:none;
        border:none;
        border-bottom:2px solid rgba(215,181,109,.22);
        text-align:left;
        cursor:pointer;
        transition:background .18s;
    }

    .profile-menu-user:hover{
        background:rgba(255,255,255,.05);
    }

    .profile-menu-user:active{
        transform:scale(.99);
    }

    .profile-menu-avatar{
        width:48px;
        height:48px;
        border-radius:50%;
        object-fit:cover;
    }

    .profile-menu-info{
        flex:1;
        min-width:0;
        padding-right:18px;
    }

    .profile-menu-name{
        font-weight:600;
        color:white;
        white-space:nowrap;
        overflow:hidden;
        text-overflow:ellipsis;
    }

    .profile-menu-role{
        color:#999;
        font-size:13px;
        margin-top:3px;
    }

    .logout-btn{
        width:100%;
        display:flex;
        align-items:center;
        justify-content:space-between;
        padding:16px;
        background:none;
        border:none;
        color:#ff7777;
        cursor:pointer;
        transition:
            background .18s,
            color .18s,
            transform .15s;
    }

    .logout-btn span{
        font-weight:500;
    }

    .logout-btn svg{
        width:18px;
        height:18px;
        flex-shrink:0;
    }

    .logout-btn:hover{
        background:rgba(255,255,255,.05);
        color:#ff8d8d;
    }

    .logout-btn:active{
        transform:scale(.985);
    }

    .profile-btn:hover{
        transform:translateY(-2px);
        border-color:rgba(215,181,109,.55);
        box-shadow:
            0 0 22px rgba(215,181,109,.22);
    }

    .footer-link{
        text-decoration:underline;
        text-underline-offset:3px;
        transition:
            color .2s,
            opacity .2s,
            text-shadow .2s;
    }

    .privacy-link{
        color:#ff6b6b;
    }

    .privacy-link:hover{
        color:#ff9b9b;
        text-shadow:0 0 8px rgba(255,107,107,.35);
    }

    .terms-link{
        color:#6fb6ff;
    }

    .terms-link:hover{
        color:#9fd1ff;
        text-shadow:0 0 8px rgba(111,182,255,.35);
    }

    .footer-divider{
        margin:0 10px;
        color:#666;
        user-select:none;
    }

    .footer-description{
        color:#999;
        line-height:1.8;
        max-width:700px;
        margin:auto;
        font-size:16px;
    }

    .book-page{
        width:min(1180px,92%);
        margin:auto;
        display:flex;
        gap:42px;
        align-items:flex-start;
    }

    .book-cover{
        width:260px;
        aspect-ratio:3/4;
        border-radius:18px;
        flex-shrink:0;
    }

    .book-info{
        flex:1;
        min-width:0;
    }

    .book-title{
        width:70%;
        height:42px;
        border-radius:12px;
        margin-bottom:22px;
    }

    .alternate-titles{
        margin:-10px 0 18px;
        display:flex;
        flex-direction:column;
        gap:8px;
        opacity:.45;
    }

    .alternate-line{
        height:14px;
        border-radius:7px;
    }

    .alternate-line.long{
        width:65%;
    }

    .alternate-line.medium{
        width:48%;
    }

    .book-tags{
        display:flex;
        align-items:center;
        gap:12px;
        margin-bottom:24px;
        flex-wrap:nowrap;
    }

    .tag{
        display:inline-flex;
        align-items:center;
        justify-content:center;
        padding:0 16px;
        height:34px;
        border-radius:999px;
        white-space:nowrap;
        overflow:hidden;
        text-overflow:ellipsis;
        font-size:14px;
        font-weight:600;
        flex:0 1 auto;
        min-width:0;
    }

    .language-tag{
        background:rgba(70,120,235,.18) !important;
        border:1px solid rgba(110,165,255,.32) !important;
        color:#a9d3ff !important;
    }

    .extra-tags{
        display:flex;
        flex-wrap:wrap;
        gap:10px;
        margin:-6px 0 30px;
    }

    .small-tag{
        display:inline-flex;
        align-items:center;
        justify-content:center;
        padding:0 12px;
        min-height:28px;
        border-radius:999px;
        white-space:nowrap;
        overflow:hidden;
        text-overflow:ellipsis;
        background:rgba(255,255,255,.05);
        border:1px solid rgba(255,255,255,.08);
        color:#d6d6d6;
        font-size:13px;
    }

    .book-tag-list{
        display:flex;
        flex-wrap:wrap;
        gap:10px;
        margin:30px 0 0;
    }

    .book-tag{
        display:inline-flex;
        align-items:center;
        justify-content:center;
        min-height:26px;
        padding:0 12px;
        border-radius:999px;
        background:rgba(52,92,185,.18);
        border:1px solid rgba(90,145,255,.28);
        color:#a8cfff;
        font-size:12px;
        font-weight:500;
        white-space:nowrap;
        flex:0 0 auto;
    }

    .book-tag::after{
        background:linear-gradient(
            90deg,
            transparent,
            rgba(140,190,255,.16),
            transparent
        );
    }

    .tag{
        width:120px;
        height:34px;
        border-radius:999px;
    }

    .book-meta{
        display:flex;
        flex-direction:column;
        gap:18px;
    }

    .meta-row{
        display:flex;
        align-items:center;
        gap:18px;
    }

    .meta-row span{
        width:115px;
        color:#9d9d9d;
        font-weight:600;
        white-space:nowrap;
    }

    .meta-value{
        width:220px;
        height:20px;
        border-radius:8px;
    }

    .meta-value.small{
        width:90px;
    }

    .book-description{
        margin-top:38px;
        color:#f2f2f2;
        font-family:"Noto Serif",serif;
        font-size:17px;
        line-height:1.9;
        letter-spacing:.01em;
        white-space:pre-wrap;
        word-break:break-word;
        text-align:justify;
    }

    .desc-line{
        height:18px;
        border-radius:8px;
    }

    .desc-line.long{
        width:100%;
    }

    .desc-line.medium{
        width:82%;
    }

    .desc-line.short{
        width:58%;
    }
        
    .download-placeholder-wrapper{
        width:min(1180px,92%);
        margin:70px auto 0;
        display:flex;
        justify-content:center;
    }

    .download-epub-btn{
        width:260px;
        height:58px;
        display:flex;
        align-items:center;
        justify-content:center;
        text-decoration:none;
        font-family:Cinzel,serif;
        font-size:17px;
        font-weight:700;
        letter-spacing:.06em;
        color:#1b1405;
        border-radius:16px;
        background:
            linear-gradient(
                180deg,
                #fff4c7 0%,
                #f3d889 12%,
                #ddb15b 48%,
                #b57c27 100%
            );
        border:1px solid rgba(255,240,185,.85);
        box-shadow:
            inset 0 1px 0 rgba(255,255,255,.75),
            inset 0 -2px 6px rgba(90,50,0,.35),
            0 0 18px rgba(215,181,109,.25),
            0 12px 26px rgba(0,0,0,.35);
        position:relative;
        overflow:hidden;
        transition:
            transform .22s,
            box-shadow .22s,
            filter .22s;
    }

    .download-epub-btn::before{
        content:"";
        position:absolute;
        top:0;
        left:-160%;
        width:70%;
        height:100%;
        background:
            linear-gradient(
                115deg,
                transparent,
                rgba(255,255,255,.72),
                transparent
            );
        transform:skewX(-22deg);
        transition:left .75s ease;
    }

    .download-epub-btn:hover{
        transform:translateY(-3px);
        filter:brightness(1.06);
        box-shadow:
            inset 0 1px 0 rgba(255,255,255,.85),
            inset 0 -2px 8px rgba(90,50,0,.45),
            0 0 30px rgba(230,195,105,.42),
            0 18px 36px rgba(0,0,0,.45);
    }

    .download-epub-btn:hover::before{
        left:170%;
    }

    .download-epub-btn:active{
        transform:translateY(1px) scale(.985);
    }

    .placeholder{
        position:relative;
        overflow:hidden;
        background:rgba(255,255,255,.06);
        border:1px solid rgba(255,255,255,.05);
    }

    .placeholder::after{
        content:"";
        position:absolute;
        inset:0;
        transform:translateX(-100%);
        background:linear-gradient(
            90deg,
            transparent,
            rgba(255,255,255,.10),
            transparent
        );
        animation:placeholder 1.35s linear infinite;
    }

    @keyframes placeholder{
        to{
            transform:translateX(100%);
        }
    }

    .book-title-text{
        font-family:Cinzel,serif;
        font-size:42px;
        font-weight:750;
        line-height:1.18;
        color:var(--gold);
        margin-bottom:14px;
    }

    .alternate-titles-text{
        font-family:"Inter",sans-serif;
        font-size:15px;
        line-height:1.6;
        color:#d7d7d7;
        opacity:.70;
        margin-bottom:22px;
    }

    .tag{
        display:inline-flex;
        align-items:center;
        justify-content:center;
        padding:0 16px;
        height:34px;
        border-radius:999px;
        background:rgba(215,181,109,.12);
        border:1px solid rgba(215,181,109,.25);
        color:var(--gold2);
        font-size:14px;
        font-weight:600;
        white-space:nowrap;
    }

    .small-tag{
        display:inline-flex;
        align-items:center;
        justify-content:center;
        padding:0 12px;
        height:28px;
        border-radius:999px;
        background:rgba(255,255,255,.05);
        border:1px solid rgba(255,255,255,.08);
        color:#d5d5d5;
        font-size:13px;
        white-space:nowrap;
    }

    .genre-divider{
        color:rgba(255,255,255,.28);
        font-size:18px;
        user-select:none;
    }

    .author-link{
        color:var(--gold2);
        text-decoration:none;
        transition:.18s;
    }

    .author-link:hover{
        color:#fff0b8;
        text-decoration:underline;
        text-underline-offset:3px;
    }

    .description-section{
        margin-top:40px;
        position:relative;
    }

    .book-description{
        color:#f2f2f2;
        font-family:"Noto Serif",serif;
        font-size:17px;
        line-height:1.9;
        letter-spacing:.01em;
        white-space:pre-wrap;
        word-break:break-word;
        overflow:hidden;
    }

    .book-description.collapsed{
        max-height:250px;
        position:relative;
    }

    .book-description.collapsed::after{
        content:"";
        position:absolute;
        left:-28px;
        right:-28px;
        bottom:0;
        height:170px;
        background:linear-gradient(
            to bottom,
            rgba(9,9,9,0),
            rgba(9,9,9,.45) 35%,
            rgba(9,9,9,.93) 82%,
            rgba(9,9,9,1)
        );
        pointer-events:none;
    }

    .book-description.expanded{
        max-height:none;
    }

    .book-description.expanded::after{
        display:none;
    }

    .description-toggle{
        position:absolute;
        left:50%;
        bottom:14px;
        transform:translateX(-50%);
        width:56px;
        height:56px;
        display:flex;
        justify-content:center;
        align-items:center;
        border:none;
        background:none;
        cursor:pointer;
        color:var(--gold);
        z-index:20;
        transition:
            transform .25s cubic-bezier(.22,1,.36,1),
            color .25s;
    }

    .description-toggle:hover{
        color:var(--gold2);
        transform:
            translateX(-50%)
            scale(1.12);
    }

    .description-toggle:active{
        transform:
            translateX(-50%)
            scale(.94);
    }

    .description-toggle.expanded{
        position:relative;
        left:50%;
        bottom:auto;
        margin-top:20px;
    }

    .toggle-arrow{
        width:32px;
        height:32px;
        transition:
            transform .45s cubic-bezier(.22,1,.36,1);
    }

    .description-toggle.expanded .toggle-arrow{
        transform:rotate(180deg);
    }

    .book-description-content{
        padding:0 12px;
    }

    @media(max-width:900px){
        main{
            margin-top:58px;
            padding:30px 0;
        }
        nav{
            height:58px;
            padding:0 14px;
        }
        .nav-left{
            gap:8px;
        }
        .nav-right{
            gap:8px;
        }
        .nav-btn{
            padding:8px 14px;
            font-size:14px;
        }
        .profile-btn{
            width:38px;
            height:38px;
        }
        footer{
            padding:45px 24px;
        }
        .icon-btn:hover{
            transform:none;
            box-shadow:none;
        }
        .icon-btn:active{
            transform:scale(.95);
        }
        #closeErrorModal:hover{
            transform:none;
            box-shadow:none;
        }
        #closeErrorModal:active{
            transform:scale(.96);
        }
        .icon-btn{
            width:38px;
            height:38px;
        }
        .icon-btn svg{
            width:18px;
            height:18px;
        }
        .profile-menu{
            top:60px;
            right:15px;
            width:230px;
        }
        .profile-menu-user{
            padding:14px;
        }
        .logout-btn{
            padding:15px;
        }
        .footer-description{
            font-size:14px;
            line-height:1.7;
        }
        .book-page{
            flex-direction:column;
            align-items:center;
            gap:28px;
        }
        .book-cover{
            width:min(270px,70vw);
        }
        .book-info{
            width:100%;
        }
        .book-title{
            width:100%;
        }
        .meta-row{
            flex-wrap:wrap;
        }
        .meta-value{
            width:160px;
        }
        .download-placeholder-wrapper{
            margin-top:45px;
        }
        .download-placeholder{
            width:min(340px,100%);
        }
        .book-description{
            margin-top:28px;
            font-size: 14px;
        }
        .book-title-text{
            font-size: 26px;
        }
        .book-title-text,
        .alternate-titles-text,
        .book-tags,
        .extra-tags,
        .book-tag-list{
            padding-left:12px;
            padding-right:12px;
        }
        .meta-row{
            padding-left:15px;
            padding-right:12px;
        }
    }

</style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <button id="menuBtn" class="icon-btn">
                蛊
            </button>
            <a class="nav-btn active" href="/browse">
                Browse
            </a>
        </div>
        <div class="nav-right">
            <button id="profileBtn" class="profile-btn hidden"></button>
        </div>
    </nav>

    <div id="profileMenu" class="profile-menu hidden">
        <button id="profilePageBtn" class="profile-menu-user">
            <img id="menuAvatar" class="profile-menu-avatar">
            <div class="profile-menu-info">
                <div id="menuName" class="profile-menu-name"></div>
                <div id="menuRole" class="profile-menu-role"></div>
            </div>
        </button>
        <button id="logoutBtn" class="logout-btn">
            <span>Log Out</span>
            <svg xmlns="http://www.w3.org/2000/svg"
                width="18"
                height="18"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                viewBox="0 0 24 24">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
        </button>
    </div>

<main>
    <div id="bookContainer"></div>
</main>

    <footer>
        <div style="font-family:Cinzel,serif;font-size:28px;color:var(--gold);margin-bottom:12px;">
            蛊
        </div>
        <div style="font-size:22px;margin-bottom:10px;">
            Immortal Library
        </div>
        <div class="footer-description">
            An ever-growing library dedicated to preserving Literature for readers around the world
        </div>
        <div style="margin-top:40px;color:#666;font-size:14px;">
            © 2026 Febris Forge. All Rights Reserved
        </div>
        <div style="margin-top:12px;font-size:13px;">
            <a class="footer-link privacy-link" href="/pp">Privacy Policy</a>
            <span class="footer-divider">•</span>
            <a class="footer-link terms-link" href="/tos">Terms of Service</a>
        </div>
    </footer>

<script type="module">

    import { auth, db } from "./src/firebase";

    import {
        onAuthStateChanged,
        signOut
    } from "firebase/auth";

    import {
        doc,
        getDoc
    } from "firebase/firestore";

    const params = new URLSearchParams(window.location.search);
    const bookId = params.get("id")?.trim();
    const profileBtn=document.getElementById("profileBtn");
    const errorModal=document.getElementById("errorModal");
    const errorTitle=document.getElementById("errorTitle");
    const errorMessage=document.getElementById("errorMessage");
    const closeErrorModal=document.getElementById("closeErrorModal");
    const menuBtn=document.getElementById("menuBtn");
    const profileMenu=document.getElementById("profileMenu");
    const menuAvatar=document.getElementById("menuAvatar");
    const menuName=document.getElementById("menuName");
    const menuRole=document.getElementById("menuRole");
    const profilePageBtn=document.getElementById("profilePageBtn");
    const logoutBtn=document.getElementById("logoutBtn");
    const bookContainer = document.getElementById("bookContainer");

    if(!bookId){
        window.location.replace("/browse");
    }

    let ignoreScrollUntil = 0;

    function showLoggedIn(profile,isOwner){
        profileBtn.classList.remove("hidden");
        profileBtn.innerHTML=`
            <img src="${profile.avatar}" class="admin-avatar">
        `;
        menuAvatar.src=profile.avatar;
        menuName.textContent=profile.displayName;
        menuRole.textContent=isOwner ? "Owner" : "Administrator";
    }
            
    onAuthStateChanged(auth, async (user) => {
        try{
            if(!user){
                profileBtn.classList.add("hidden");
                profileBtn.innerHTML = "";
                profileMenu.classList.add("hidden");
                return;
            }
            const adminDoc = await getDoc(
                doc(db, "admins", user.email.toLowerCase())
            );
            if(!adminDoc.exists()){
                await signOut(auth);
                profileBtn.classList.add("hidden");
                profileBtn.innerHTML = "";
                profileMenu.classList.add("hidden");
                return;
            }
            const profileDoc = await getDoc(
                doc(db, "userdata", user.uid)
            );
            if(!profileDoc.exists()){
                throw new Error("User profile not found.");
            }
            showLoggedIn(
                profileDoc.data(),
                adminDoc.data().owner === true
            );
        }
        catch(err){
            console.error(err);
        }
    });

    profileBtn.onclick = (e) => {
        e.stopPropagation();
        const openMenu = () => {
            ignoreScrollUntil = Date.now() + 400;
            profileMenu.classList.remove("hidden");
        };
        if (window.scrollY > 30) {
            window.scrollTo({
                top: 0,
                behavior: "smooth"
            });
            const waitForTop = () => {
                if (window.scrollY <= 5) {
                    openMenu();
                } else {
                    requestAnimationFrame(waitForTop);
                }
            };
            requestAnimationFrame(waitForTop);
        } else {
            profileMenu.classList.toggle("hidden");
        }
    };

    document.addEventListener("click",(e)=>{
        if(
            !profileMenu.contains(e.target)
            &&
            !profileBtn.contains(e.target)
        ){
            profileMenu.classList.add("hidden");
        }
    });

    window.addEventListener("scroll", () => {
        if (Date.now() < ignoreScrollUntil) return;
        if (!profileMenu.classList.contains("hidden")) {
            profileMenu.classList.add("hidden");
        }
    });

    logoutBtn.onclick=async()=>{
        profileMenu.classList.add("hidden");
        await signOut(auth);
    };

    profilePageBtn.onclick=()=>{
        window.location.href="/profile";
    };

    menuBtn.onclick = () => {
        window.location.href = "/index";
    };

    function renderPlaceholders(){
        bookContainer.innerHTML = `
            <div class="book-page">
                <div class="book-cover placeholder"></div>
                <div class="book-info">
                    <div class="book-title placeholder"></div>
                    <div class="alternate-titles">
                        <div class="alternate-line long placeholder"></div>
                        <div class="alternate-line medium placeholder"></div>
                    </div>
                    <div class="book-tags">
                        <div class="tag placeholder"></div>
                        <div class="tag placeholder"></div>
                    </div>
                    <div class="extra-tags">
                        <div class="small-tag placeholder"></div>
                        <div class="small-tag placeholder"></div>
                        <div class="small-tag placeholder"></div>
                        <div class="small-tag placeholder"></div>
                        <div class="small-tag placeholder"></div>
                    </div>
                    <div class="book-meta">
                        <div class="meta-row">
                            <span>Author</span>
                            <div class="meta-value placeholder"></div>
                        </div>
                        <div class="meta-row">
                            <span>Category</span>
                            <div class="meta-value placeholder"></div>
                        </div>
                        <div class="meta-row">
                            <span>Origin</span>
                            <div class="meta-value placeholder"></div>
                        </div>
                        <div class="meta-row">
                            <span>Chapters</span>
                            <div class="meta-value small placeholder"></div>
                        </div>
                        <div class="meta-row">
                            <span>Status</span>
                            <div class="meta-value small placeholder"></div>
                        </div>
                        <div class="meta-row">
                            <span>Uploaded By</span>
                            <div class="meta-value placeholder"></div>
                        </div>
                    </div>
                    <div class="book-tag-list">
                        <div class="book-tag placeholder"></div>
                        <div class="book-tag placeholder"></div>
                        <div class="book-tag placeholder"></div>
                        <div class="book-tag placeholder"></div>
                        <div class="book-tag placeholder"></div>
                        <div class="book-tag placeholder"></div>
                        <div class="book-tag placeholder"></div>
                    </div>
                    <div class="book-description">
                        <div class="desc-line long placeholder"></div>
                        <div class="desc-line long placeholder"></div>
                        <div class="desc-line medium placeholder"></div>
                        <div class="desc-line long placeholder"></div>
                        <div class="desc-line short placeholder"></div>
                    </div>
                    <div class="download-placeholder-wrapper">
                        <div class="download-placeholder placeholder"></div>
                    </div>
                </div>
            </div>
        `;
    }
    
    function titleCase(text){
        const keepLower=new Set([
            "a",
            "an",
            "and",
            "as",
            "at",
            "but",
            "by",
            "for",
            "from",
            "if",
            "in",
            "into",
            "is",
            "nor",
            "of",
            "off",
            "on",
            "onto",
            "or",
            "out",
            "over",
            "per",
            "so",
            "than",
            "the",
            "to",
            "under",
            "up",
            "upon",
            "via",
            "with",
            "yet"
        ]);
        const keepUpper=new Set([
            "op",
            "mc",
            "npc",
            "hp",
            "mp",
            "ssr",
            "sr",
            "ur",
            "r",
            "s",
            "ss",
            "sss",
            "vr",
            "ar",
            "mmorpg",
            "rpg",
            "pvp",
            "pve",
            "ai",
            "vrmmo",
            "usa",
            "uk",
            "eu",
            "jp",
            "kr",
            "cn",
            "id",
        ]);
        return text
            .toLowerCase()
            .split(/\s+/)
            .map((word,index)=>{
                if(keepUpper.has(word)){
                    return word.toUpperCase();
                }
                if(
                    index!==0 &&
                    keepLower.has(word)
                ){
                    return word;
                }
                return word.charAt(0).toUpperCase()+word.slice(1);
            })
            .join(" ");
    }

    function displayLanguage(language){
        return language.split(" - ")[0];
    }

    function displayGenres(genres){
        return genres.map(titleCase);
    }

    async function renderBook(book){
        let uploader = "Unknown";
        try{
            const uploaderSnap = await getDoc(
                doc(
                    db,
                    "userdata",
                    book.uploaderUid
                )
            );
            if(uploaderSnap.exists()){
                uploader = uploaderSnap.data().displayName;
            }
        }
        catch(err){
            console.error(err);
        }
        bookContainer.innerHTML = `
            <div class="book-page">
                <img
                    class="book-cover"
                    src="${book.coverUrl}"
                    alt="${book.bookName}"
                >
                <div class="book-info">
                    <h1 class="book-title-text">
                        ${book.bookName}
                    </h1>
                    ${
                        book.alternateTitles?.length
                        ?
                        `
                        <div class="alternate-titles-text">
                            ${book.alternateTitles.join(" • ")}
                        </div>
                        `
                        :
                        ""
                    }
                    <div class="book-tags">
                        <div class="tag">
                            ${titleCase(book.mainGenre)}
                        </div>
                        <div class="genre-divider">
                            •
                        </div>
                        <div class="tag language-tag">
                            ${displayLanguage(book.language)}
                        </div>
                    </div>
                    ${
                        book.genres?.length
                        ?
                        `
                        <div class="extra-tags">
                            ${
                                displayGenres(book.genres).map(g=>`
                                    <div class="small-tag">${g}</div>
                                `).join("")
                            }
                        </div>
                        `
                        :
                        ""
                    }
                    <div class="book-meta">
                        <div class="meta-row">
                            <span>Author</span>
                        <div>
                            <a
                                class="author-link"
                                href="https://www.google.com/search?q=${encodeURIComponent(`${book.category.toLowerCase()} author ${book.authorName}`)}"
                                target="_blank"
                                rel="noopener noreferrer"
                            >
                                ${book.authorName}
                            </a>
                        </div>
                        </div>
                        <div class="meta-row">
                            <span>Category</span>
                            <div>${book.category}</div>
                        </div>
                        <div class="meta-row">
                            <span>Origin</span>
                            <div>${book.origin}</div>
                        </div>
                        <div class="meta-row">
                            <span>Chapters</span>
                            <div>${book.chapterNumber.toLocaleString()}</div>
                        </div>
                        <div class="meta-row">
                            <span>Status</span>
                            <div>${book.status}</div>
                        </div>
                        <div class="meta-row">
                            <span>Uploaded By</span>
                            <div>
                                <a
                                    class="author-link"
                                    href="/profile?id=${book.uploaderUid}"
                                >
                                    ${uploader}
                                </a>
                            </div>
                        </div>
                    </div>
                    ${
                        book.tags?.length
                        ?
                        `
                        <div class="book-tag-list">
                            ${
                                book.tags.map(tag=>`
                                    <div class="book-tag">
                                        ${titleCase(tag)}
                                    </div>
                                `).join("")
                            }
                        </div>
                        `
                        :
                        ""
                    }
                    <div class="description-section">
                        <div class="book-description collapsed"><div class="book-description-content">${book.description}</div></div>
                        <button
                            class="description-toggle"
                            aria-label="Expand Description"
                        >
                            <svg
                                class="toggle-arrow"
                                viewBox="0 0 24 24"
                                fill="none"
                            >
                                <path
                                    d="M6 9L12 15L18 9"
                                    stroke="currentColor"
                                    stroke-width="2.6"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                />
                            </svg>
                        </button>
                    </div>
                    <div class="download-placeholder-wrapper">
                        <a
                            class="download-epub-btn"
                            href="${book.epubDownloadUrl}"
                            target="_blank"
                            rel="noopener noreferrer"
                        >
                            Download EPUB
                        </a>
                    </div>
                </div>
            </div>
        `;
        const description = bookContainer.querySelector(".book-description");
        const toggle = bookContainer.querySelector(".description-toggle");
        if(description.scrollHeight <= 250){
            toggle.remove();
            description.classList.remove("collapsed");
            description.classList.add("expanded");
            return;
        }
        toggle.onclick = ()=>{
            const expanded = toggle.classList.toggle("expanded");
            description.classList.toggle("collapsed", !expanded);
            description.classList.toggle("expanded", expanded);
        };
    } 

    let book = null;
    async function loadBook(){
        try{
            console.log("Loading:", bookId);
            const snap = await getDoc(
                doc(db, "epubs", bookId)
            );
            if(!snap.exists()){
                window.location.replace("/browse");
                return;
            }
            book = snap.data();
            document.title = book.bookName || "Untitled";
            await renderBook(book);
        }
        catch(err){
            console.error(err);
        }
    }

    renderPlaceholders();
    loadBook();

</script>

</body>
</html>
