<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload EPUB • Immortal Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/x-icon" href="assets/icon.ico">
<link rel="shortcut icon" href="assets/icon.ico">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">
<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }
    :root{
        --bg:#090909;
        --bg2:#111111;
        --card:#171717;
        --card2:#1d1d1d;
        --gold:#d7b56d;
        --gold2:#f0d28a;
        --text:#ececec;
        --muted:#aaaaaa;
        --border:rgba(255,255,255,.08);
    }

    html{
        scroll-behavior:smooth;
    }

    main{
        margin-top:72px;
        min-height:calc(100vh - 72px);
        display:flex;
        background:
            linear-gradient(
                to bottom,
                rgba(5,5,5,.92) 0%,
                rgba(8,8,8,.72) 18%,
                rgba(12,12,12,.55) 45%,
                rgba(8,8,8,.72) 78%,
                rgba(5,5,5,.94) 100%
            ),
            linear-gradient(
                90deg,
                rgba(5,5,5,.90) 0%,
                rgba(5,5,5,.55) 20%,
                rgba(5,5,5,.20) 50%,
                rgba(5,5,5,.55) 80%,
                rgba(5,5,5,.90) 100%
            ),
            url("assets/wp_2500x1407.jpg");

        background-size:cover;
        background-position:center;
        background-repeat:no-repeat;
    }

    body{
        visibility:hidden;
        font-family:Inter,sans-serif;
    }

    .sidebar{
        width:260px;
        flex-shrink:0;
        display:flex;
        flex-direction:column;
        background:rgba(10,10,10,.70);
        backdrop-filter:blur(18px);
        border-right:1px solid rgba(255,255,255,.08);
        padding:28px 0;
        user-select:none;
    }

    .sidebar-title{
        font-family:Cinzel,serif;
        color:var(--gold);
        font-size:20px;
        text-align:center;
        letter-spacing:.08em;
        padding:10px 0;
        margin:0;
    }

    .sidebar-mobile-top{
        display:none;
        align-items:center;
        justify-content:space-between;
        padding:0 22px 16px;
    }

    .sidebar-home{
        font-family:Inter,sans-serif;
        font-size:15px;
        font-weight:600;
        text-transform:uppercase;
        letter-spacing:.08em;
        color:#bcbcbc;
        cursor:pointer;
        transition:
            color .22s,
            letter-spacing .22s,
            text-shadow .22s;
    }

    .sidebar-home:hover{
        color:var(--gold);
        letter-spacing:.12em;
        text-shadow:
            0 0 8px rgba(215,181,109,.16);
    }

    .sidebar-close{
        background:none;
        border:none;
        color:rgba(215,181,109,.72);
        font-size:30px;
        font-weight:900;
        line-height:1;
        cursor:pointer;
        transition:
            color .2s,
            transform .2s,
            text-shadow .2s;
    }

    .sidebar-close:hover{
        color:var(--gold2);
        text-shadow:
            0 0 12px rgba(215,181,109,.35);
        transform:scale(1.08);
    }

    .sidebar-mobile-divider{
        display:none;
        width:88%;
        height:1px;
        margin:0 auto 24px;
        background:
            linear-gradient(
                90deg,
                transparent,
                rgba(215,181,109,.38),
                transparent
            );
    }

    .sidebar-item{
        position:relative;
        text-align:center;
        font-family:Inter,sans-serif;
        font-size:15px;
        font-weight:600;
        letter-spacing:.08em;
        text-transform:uppercase;
        color:#969696;
        padding:18px 0;
        cursor:pointer;
        transition:
            color .22s,
            letter-spacing .22s,
            text-shadow .22s;
    }

    .sidebar-item:hover{
        color:#d8d8d8;
        letter-spacing:.12em;
    }

    .sidebar-item.active{
        background:transparent;
        border:none;
        color:var(--gold);
        letter-spacing:.16em;
        text-shadow:
            0 0 8px rgba(215,181,109,.18);
    }

    .sidebar-item::after{
        content:"";
        position:absolute;
        left:20%;
        bottom:0;
        width:60%;
        height:1px;
        background:
            linear-gradient(
                90deg,
                transparent,
                rgba(255,255,255,.08),
                transparent
            );
    }

    #mobileHome::after{
        left:10%;
        width:80%;
        background:
            linear-gradient(
                90deg,
                transparent,
                rgba(215,181,109,.35),
                transparent
            );
    }

    .sidebar-title::after{
        content:"";
        display:block;
        width:120px;
        height:1px;
        margin:14px auto 0;
        background:
            linear-gradient(
                90deg,
                transparent,
                rgba(215,181,109,.35),
                transparent
            );
    }

    .main-panel{
        flex:1;
        padding:40px;
        overflow:auto;
    }

    body{
        background:#090909;
        color:var(--text);
        font-family:Inter,sans-serif;
    }

    body::before{
        content:"";
        position:fixed;
        inset:0;
        background:
            radial-gradient(circle at top,rgba(255,220,130,.05),transparent 35%),
            radial-gradient(circle at bottom,rgba(255,255,255,.02),transparent 40%);
        pointer-events:none;
        z-index:-2;
    }

    body::after{
        content:"";
        position:fixed;
        inset:0;
        background-image:
            radial-gradient(rgba(255,255,255,.03) 1px,transparent 1px);
        background-size:42px 42px;
        opacity:.25;
        pointer-events:none;
        z-index:-1;
    }

    nav{
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:72px;
        display:flex;
        justify-content:space-between;
        align-items:center;
        padding:0 70px;
        background:rgba(10,10,10,.82);
        backdrop-filter:blur(14px);
        border-bottom:1px solid var(--border);
        z-index:1000;
    }

    .nav-left{
        display:flex;
        gap:16px;
        align-items:center;
    }

    .nav-right{
        display:flex;
        align-items:center;
        gap:16px;
        position:relative;
    }

    .nav-btn{
        text-decoration:none;
        padding:11px 22px;
        border-radius:30px;
        color:#d7d7d7;
        transition:.25s;
        font-weight:500;
    }

    .nav-btn:hover{
        transform: translateY(-1px);
    }

    .active{
        background:#e3c16e;
        color:#000;
    }

    footer{
        padding:70px;
        text-align:center;
        border-top:2px solid rgba(255,255,255, .30);
        color:#888;
    }

    .modal{
        position:fixed;
        inset:0;
        display:flex;
        justify-content:center;
        align-items:center;
        background:rgba(0,0,0,.75);
        backdrop-filter:blur(10px);
        z-index:9999;
    }

    .hidden{
        display:none;
    }

    .modal-card{
        width:420px;
        max-width:90%;
        background:#151515;
        border:1px solid rgba(255,255,255,.08);
        border-radius:20px;
        padding:35px;
        text-align:center;
    }

    .modal-card h2{
        margin-bottom:10px;
    }

    .modal-card p{
        color:#aaa;
        margin-bottom:25px;
    }

    .admin-avatar{
        width:100%;
        height:100%;
        border-radius:50%;
        object-fit:cover;
        display:block;
    }

    .profile-btn{
        width:46px;
        height:46px;
        padding:0;
        background:transparent;
        border-radius:50%;
        overflow:hidden;
        display:flex;
        justify-content:center;
        align-items:center;
        cursor:pointer;
        transition:
            transform .18s,
            box-shadow .18s,
            border-color .18s;
        border:2px solid transparent;
    }

    .profile-btn:active{
        transform:scale(.95);
    }

    #googleLogin:disabled{
        opacity:.6;
        cursor:not-allowed;
    }

    .icon-btn{
        width:44px;
        height:44px;
        display:flex;
        justify-content:center;
        align-items:center;
        border:none;
        background:transparent;
        color:var(--gold);
        border-radius:50%;
        cursor:pointer;
        transition:.2s;
        font-size: 24px;
    }

    .icon-btn:active{
        transform:scale(.94);
    }

    .profile-btn.hidden{
        display:none;
    }

    #closeErrorModal{
        margin-top:15px;
        width:100%;
        padding:12px;
        background:#222;
        color:white;
        border:none;
        border-radius:12px;
        font-weight:500;
        cursor:pointer;
        transition:
            background .2s,
            transform .15s,
            box-shadow .2s;
    }

    #closeErrorModal:hover{
        background:#2f2f2f;
        transform:translateY(-2px);
        box-shadow:0 8px 24px rgba(0,0,0,.35);
    }

    #closeErrorModal:active{
        transform:scale(.97);
        background:#1a1a1a;
    }

    .profile-menu{
        position:absolute;
        top:75px;
        right:65px; 
        width:260px;
        background:#181818;
        border:1px solid rgba(255,255,255,.08);
        border-radius:16px;
        overflow:hidden;
        box-shadow:0 18px 50px rgba(0,0,0,.45);
        animation:profileMenu .18s ease;
        z-index:10;
    }

    @keyframes profileMenu{
        from{
            opacity:0;
            transform:translateY(-8px);
        }
        to{
            opacity:1;
            transform:none;
        }
    }

    .profile-menu-user{
        width:100%;
        display:flex;
        align-items:center;
        gap:14px;
        padding:16px;
        background:none;
        border:none;
        border-bottom:2px solid rgba(215,181,109,.22);
        text-align:left;
        cursor:pointer;
        transition:background .18s;
    }

    .profile-menu-user:hover{
        background:rgba(255,255,255,.05);
    }

    .profile-menu-user:active{
        transform:scale(.99);
    }

    .profile-menu-avatar{
        width:48px;
        height:48px;
        border-radius:50%;
        object-fit:cover;
    }

    .profile-menu-info{
        flex:1;
        min-width:0;
        padding-right:18px;
    }

    .profile-menu-name{
        font-weight:600;
        color:white;
        white-space:nowrap;
        overflow:hidden;
        text-overflow:ellipsis;
    }

    .profile-menu-role{
        color:#999;
        font-size:13px;
        margin-top:3px;
    }

    .logout-btn{
        width:100%;
        display:flex;
        align-items:center;
        justify-content:space-between;
        padding:16px;
        background:none;
        border:none;
        color:#ff7777;
        cursor:pointer;
        transition:
            background .18s,
            color .18s,
            transform .15s;
    }

    .logout-btn span{
        font-weight:500;
    }

    .logout-btn svg{
        width:18px;
        height:18px;
        flex-shrink:0;
    }

    .logout-btn:hover{
        background:rgba(255,255,255,.05);
        color:#ff8d8d;
    }

    .logout-btn:active{
        transform:scale(.985);
    }

    .profile-btn:hover{
        transform:translateY(-2px);
        border-color:rgba(215,181,109,.55);
        box-shadow:
            0 0 22px rgba(215,181,109,.22);
    }

    .footer-link{
        text-decoration:underline;
        text-underline-offset:3px;
        transition:
            color .2s,
            opacity .2s,
            text-shadow .2s;
    }

    .privacy-link{
        color:#ff6b6b;
    }

    .privacy-link:hover{
        color:#ff9b9b;
        text-shadow:0 0 8px rgba(255,107,107,.35);
    }

    .terms-link{
        color:#6fb6ff;
    }

    .terms-link:hover{
        color:#9fd1ff;
        text-shadow:0 0 8px rgba(111,182,255,.35);
    }

    .footer-divider{
        margin:0 10px;
        color:#666;
        user-select:none;
    }

    .footer-description{
        color:#999;
        line-height:1.8;
        max-width:700px;
        margin:auto;
        font-size:16px;
    }

    .content-title{
        font-family:Cinzel,serif;
        font-size:36px;
        color:var(--gold);
        margin-bottom:30px;
        letter-spacing:.08em;
    }

    .upload-layout{
        display:grid;
        grid-template-columns:302px minmax(0,1fr);
        gap:32px;
    }

    .cover-upload{
        width:302px;
        aspect-ratio:3/4;
        flex-shrink:0;
        border:1px solid rgba(255,255,255,.08);
        border-radius:24px;
        background:
            linear-gradient(rgba(255,255,255,.02),rgba(255,255,255,.01)),
            rgba(18,18,18,.82);
        backdrop-filter:blur(20px);
        cursor:pointer;
        display:flex;
        justify-content:center;
        align-items:center;
        position:relative;
        overflow:hidden;
        transition:.25s;
    }

    .cover-upload:hover{
        border-color:rgba(215,181,109,.45);
        box-shadow:
            0 0 30px rgba(215,181,109,.08);
    }

    .cover-upload input{
        display:none;
    }

    .cover-placeholder{
        text-align:center;
        color:#d2d2d2;
        pointer-events:none;
    }

    .cover-placeholder svg{
        width:58px;
        height:58px;
        margin-bottom:18px;
        opacity:.75;
    }

    .cover-placeholder h3{
        font-size:18px;
        font-weight:600;
        color:#ececec;
    }

    .cover-placeholder p{
        margin-top:8px;
        color:#999;
        font-size:14px;
    }

    .upload-right{
        flex:1;
        min-width:0;
        width:100%;
        display:flex;
        flex-direction:column;
        gap:18px;
    }

    .upload-row{
        display:flex;
        gap:18px;
    }

    .field{
        flex:1;
        display:flex;
        flex-direction:column;
        gap:8px;
    }

    .field label{
        color:#cfcfcf;
        font-size:13px;
        letter-spacing:.08em;
        text-transform:uppercase;
        padding-left:20px;
    }

    .field input{
        height:56px;
        border:none;
        outline:none;
        border-radius:18px;
        padding:0 18px;
        background:rgba(26,26,26,.92);
        border:1px solid rgba(255,255,255,.08);
        color:#ececec;
        font-size:15px;
        transition:.22s;
    }

    #chapterNumber{
        appearance:textfield;
        -moz-appearance:textfield;
    }

    #chapterNumber::-webkit-outer-spin-button,
    #chapterNumber::-webkit-inner-spin-button{
        -webkit-appearance:none;
        margin:0;
    }

    .field select{
        height:56px;
        border:none;
        outline:none;
        border-radius:18px;
        padding:0 18px;
        background:rgba(26,26,26,.92);
        border:1px solid rgba(255,255,255,.08);
        color:#ececec;
        font-size:15px;
        transition:.22s;
    }

    .field input::placeholder{
        color:#8f8f8f;
    }

    .field input:focus{
        border-color:rgba(215,181,109,.55);
        box-shadow:
            0 0 0 1px rgba(215,181,109,.15),
            0 0 18px rgba(215,181,109,.10);
    }

    .field select:focus{
        border-color:rgba(215,181,109,.55);
        box-shadow:
            0 0 0 1px rgba(215,181,109,.15),
            0 0 18px rgba(215,181,109,.10);
    }

    .metadata-section{
        margin-top:34px;
        display:flex;
        flex-direction:column;
        gap:22px;
    }

    .metadata-section .field{
        width:100%;
    }

    .metadata-section textarea{
        width:100%;
        border:none;
        outline:none;
        border-radius:20px;
        padding:18px 20px;
        background:rgba(26,26,26,.92);
        border:1px solid rgba(255,255,255,.08);
        color:#ececec;
        font:inherit;
        line-height:1.75;
        transition:.22s;
    }

    .auto-grow{
        min-height:60px;
        overflow:hidden;
        resize:none;
    }

    #description{
        min-height:220px;
        max-height:220px;
        overflow-y:auto;
        overflow-x:hidden;
        resize:none;
    }

    .description-counter{
        display:flex;
        justify-content:flex-end;
        align-items:center;
        margin-top:8px;
        padding-right:8px;
        color:#8f8f8f;
        font-size:13px;
        font-weight:500;
        user-select:none;
        transition:color .18s;
    }

    .description-counter.warning{
        color:#e2c67e;
    }

    .description-counter.danger{
        color:#ff7b7b;
    }

    @keyframes counterFlash{
        0%{
            color:#ff7b7b;
            text-shadow:none;
        }
        35%{
            color:#ff3b3b;
            text-shadow:
                0 0 6px rgba(255,59,59,.45),
                0 0 12px rgba(255,59,59,.25);
        }
        100%{
            color:#ff7b7b;
            text-shadow:none;
        }
    }

    .description-counter.flash{
        animation:counterFlash .22s ease;
    }

    #description::-webkit-scrollbar{
        width:10px;
    }

    #description::-webkit-scrollbar-button,
    #description::-webkit-scrollbar-button:start,
    #description::-webkit-scrollbar-button:end,
    #description::-webkit-scrollbar-button:single-button{
        display:none;
        width:0;
        height:0;
    }

    #description::-webkit-scrollbar-track{
        background:transparent;
        margin:10px 0;
    }

    #description::-webkit-scrollbar-thumb{
        border-radius:999px;
        border:3px solid transparent;
        background:
            linear-gradient(
                180deg,
                rgba(240,210,138,.85),
                rgba(199,157,75,.85)
            );
        background-clip:padding-box;
    }

    #description::-webkit-scrollbar-thumb:hover{
        background:
            linear-gradient(
                180deg,
                rgba(255,225,150,.95),
                rgba(215,181,109,.95)
            );
        background-clip:padding-box;
    }

    #description::-webkit-scrollbar-corner{
        background:transparent;
    }

    .metadata-section textarea::placeholder{
        color:#8f8f8f;
    }

    .metadata-section textarea:focus{
        border-color:rgba(215,181,109,.55);
        box-shadow:
            0 0 0 1px rgba(215,181,109,.15),
            0 0 18px rgba(215,181,109,.10);
    }

    .upload-btn{
        height:60px;
        margin-top:12px;
        border:none;
        border-radius:18px;
        cursor:pointer;
        font-size:16px;
        font-weight:700;
        letter-spacing:.08em;
        text-transform:uppercase;
        background:
            linear-gradient(180deg,#e2c67e,#c69b48);
        color:#111;
        transition:.22s;
    }

    .upload-btn:hover{
        transform:translateY(-2px);
        box-shadow:
            0 12px 35px rgba(215,181,109,.20);
    }

    .upload-btn:active{
        transform:scale(.98);
    }

    .epub-picker{
        display:flex;
        align-items:center;
        gap:18px;
        width:100%;
        max-width:100%;
        min-width:0;
        overflow:hidden;
        margin-top:20px;
        height:90px;
        padding:0 22px;
        border-radius:18px;
        cursor:pointer;
        transition:.22s;
        background:
            linear-gradient(
                180deg,
                rgba(24,24,24,.96),
                rgba(17,17,17,.96)
            );
        border:1px solid rgba(255,255,255,.08);
        box-shadow:inset 0 1px rgba(255,255,255,.03);
    }

    .epub-picker:hover{
        border-color:rgba(215,181,109,.40);
        transform:translateY(-2px);
        box-shadow:
            0 10px 26px rgba(215,181,109,.08),
            inset 0 1px rgba(255,255,255,.04);
    }

    .epub-icon{
        font-size:34px;
        flex-shrink:0;
    }

    .epub-info{
        flex:1 1 0;
        min-width:0;
        overflow:hidden;
        display:flex;
        flex-direction:column;
        justify-content:center;
    }

    .epub-title{
        color:#ededed;
        font-size:15px;
        font-weight:600;
        letter-spacing:.03em;
    }

    .epub-name{
        display:block;
        width:0;
        min-width:100%;
        margin-top:5px;
        color:#8f8f8f;
        font-size:13px;
        white-space:nowrap;
        overflow:hidden;
        text-overflow:ellipsis;
    }

    .custom-select{
        position:relative;
        width:100%;
    }

    .select-btn{
        width:100%;
        height:56px;
        background:#181818;
        border:1px solid rgba(255,255,255,.08);
        border-radius:18px;
        padding:0 18px;
        display:flex;
        justify-content:space-between;
        align-items:center;
        color:#fff;
        cursor:pointer;
        transition:.25s;
    }

    .select-btn:hover{
        border-color:rgba(215,181,109,.35);
    }

    .select-btn.open{
        border-color:rgba(255,255,255,.12);
        box-shadow:
            inset 0 0 0 1px rgba(255,255,255,.03),
            0 0 0 3px rgba(255,255,255,.025);
    }

    .select-text{
        overflow:hidden;
        white-space:nowrap;
        text-overflow:ellipsis;
    }

    .dropdown-arrow{
        width:20px;
        height:20px;
        color:var(--gold);
        transition:.25s;
    }

    .select-btn.open .dropdown-arrow{
        transform:rotate(180deg);
    }

    .dropdown-menu{
        position:absolute;
        top:calc(100% + 8px);
        left:0;
        display:grid;
        grid-auto-rows:minmax(30px,auto);
        min-width:200px;
        width:max-content;
        max-width:600px;
        max-height:320px;
        overflow-y:auto;
        overflow-x:hidden;
        padding:8px;
        background:#111111;
        border:1px solid rgba(255,255,255,.08);

<script type="module">

    import { auth, db } from "./src/firebase";

    import {
        onAuthStateChanged,
        signOut
    } from "firebase/auth";

    import {
        doc,
        getDoc
    } from "firebase/firestore";

    const profileBtn=document.getElementById("profileBtn");
    const errorModal=document.getElementById("errorModal");
    const errorTitle=document.getElementById("errorTitle");
    const errorMessage=document.getElementById("errorMessage");
    const closeErrorModal=document.getElementById("closeErrorModal");
    const menuBtn=document.getElementById("menuBtn");
    const profileMenu=document.getElementById("profileMenu");
    const menuAvatar=document.getElementById("menuAvatar");
    const menuName=document.getElementById("menuName");
    const menuRole=document.getElementById("menuRole");
    const profilePageBtn=document.getElementById("profilePageBtn");
    const logoutBtn=document.getElementById("logoutBtn");

    let ignoreScrollUntil = 0;

    function showLoggedIn(profile,isOwner){
        profileBtn.classList.remove("hidden");
        profileBtn.innerHTML=`
            <img src="${profile.avatar}" class="admin-avatar">
        `;
        menuAvatar.src=profile.avatar;
        menuName.textContent=profile.displayName;
        menuRole.textContent=isOwner ? "Owner" : "Administrator";
    }

    onAuthStateChanged(auth, async (user) => {
        try {
            if (!user) {
                window.location.href = "/index";
                return;
            }
            const adminDoc = await getDoc(
                doc(db, "admins", user.email.toLowerCase())
            );
            if (!adminDoc.exists()) {
                await signOut(auth);
                window.location.href = "/index";
                return;
            }
            const profileDoc = await getDoc(
                doc(db, "userdata", user.uid)
            );
            if (!profileDoc.exists()) {
                throw new Error("User profile not found.");
            }
            showLoggedIn(
                profileDoc.data(),
                adminDoc.data().owner === true
            );
            document.body.style.visibility = "visible";
        }
        catch (err) {
            console.error(err);
            window.location.href = "/index";
        }
    });

    profileBtn.onclick = (e) => {
        e.stopPropagation();
        const openMenu = () => {
            ignoreScrollUntil = Date.now() + 400;
            profileMenu.classList.remove("hidden");
        };
        if (window.scrollY > 30) {
            window.scrollTo({
                top: 0,
                behavior: "smooth"
            });
            const waitForTop = () => {
                if (window.scrollY <= 5) {
                    openMenu();
                } else {
                    requestAnimationFrame(waitForTop);
                }
            };
            requestAnimationFrame(waitForTop);
        } else {
            profileMenu.classList.toggle("hidden");
        }
    };

    document.addEventListener("click",(e)=>{
        if(
            !profileMenu.contains(e.target)
            &&
            !profileBtn.contains(e.target)
        ){
            profileMenu.classList.add("hidden");
        }
    });

        function titleCase(text){
            const keepLower=new Set([
                "a",
                "an",
                "and",
                "as",
                "at",
                "but",
                "by",
                "for",
                "from",
                "if",
                "in",
                "into",
                "is",
                "nor",
                "of",
                "off",
                "on",
                "onto",
                "or",
                "out",
                "over",
                "per",
                "so",
                "than",
                "the",
                "to",
                "under",
                "up",
                "upon",
                "via",
                "with",
                "yet"
            ]);
            const keepUpper=new Set([
                "op",
                "mc",
                "npc",
                "hp",
                "mp",
                "ssr",
                "sr",
                "ur",
                "r",
                "s",
                "ss",
                "sss",
                "vr",
                "ar",
                "mmorpg",
                "rpg",
                "pvp",
                "pve",
                "ai",
                "vrmmo",
                "usa",
                "uk",
                "eu",
                "jp",
                "kr",
                "cn",
                "id"
            ]);
            return text
                .toLowerCase()
                .split(/\s+/)
                .map((word,index)=>{
                    if(keepUpper.has(word)){
                        return word.toUpperCase();
                    }
                    if(
                        index!==0 &&
                        keepLower.has(word)
                    ){
                        return word;
                    }
                    return word.charAt(0).toUpperCase()+word.slice(1);
                })
                .join(" ");
        }

                    option.onclick=()=>{
                        if(selectedGenres.length>=5)
                            return;
                        selectedGenres.push(
                            titleCase(option.dataset.genre)
                        );
                        genreInput.value="";
                        renderGenres();
                        renderGenreDropdown();
                        genreDropdown.classList.remove("open");
                        genreContainer
                            .closest(".author-field")
                            .classList.remove("open");
                        genreInput.blur();
                    };
                });
        }
        function renderTags(){
            tagContainer
                .querySelectorAll(".tag-chip")
                .forEach(e=>e.remove());
            selectedTags.forEach((tag,index)=>{
                const chip=document.createElement("div");
                chip.className="tag-chip";
                chip.innerHTML=`
                    <span>${tag}</span>
                    <button type="button">✕</button>
                `;
                chip.querySelector("button").onclick=()=>{
                    selectedTags.splice(index,1);
                    renderTags();
                    renderTagDropdown(tagInput.value);
                    tagInput.focus();
                };
                tagContainer.insertBefore(
                    chip,
                    tagInput
                );
            });
            tagInput.disabled=selectedTags.length>=25;
        }
        function renderTagDropdown(search=""){
            const s=search.toLowerCase();
            const matches=tagSuggestions.filter(tag=>
                tag.toLowerCase().includes(s)
                &&
                !selectedTags.includes(tag)
            );
            tagDropdown.innerHTML=matches.map(tag=>`
                <div
                    class="genre-option"
                    data-tag="${tag}">
                    ${tag}
                </div>
            `).join("");
            tagIndex=-1;
            const opened=matches.length>0;
            tagDropdown.classList.toggle("open",opened);
            tagContainer
                .closest(".author-field")
                .classList.toggle("open",opened);
            tagDropdown
                .querySelectorAll(".genre-option")
                .forEach(option=>{
                    option.onclick=()=>{
                        if(selectedTags.length>=25)
                            return;
                        selectedTags.push(
                            titleCase(option.dataset.tag)
                        );
                        tagInput.value="";
                        renderTags();
                        renderTagDropdown();
                        tagDropdown.classList.remove("open");
                        tagContainer
                            .closest(".author-field")
                            .classList.remove("open");
                        tagInput.blur();
                    };
                });
        }
        chapterInput.addEventListener("input",()=>{
            chapterInput.value=chapterInput.value
                .replace(/\D/g,"")
                .slice(0,5);
        });
        document.querySelectorAll(".auto-grow").forEach(textarea=>{
            const resize=()=>{
                textarea.style.height="0px";
                textarea.style.height=textarea.scrollHeight+"px";
            };
            resize();
            textarea.addEventListener("input",resize);
        });
        const description=document.getElementById("description");
        const descriptionCount=document.getElementById("descriptionCount");
        const descriptionCounter=document.querySelector(".description-counter");
        function updateDescriptionCounter(){
            const length=description.value.length;
            descriptionCount.textContent=length;
            descriptionCounter.classList.remove(
                "warning",
                "danger"
            );
            if(length>=7000){
                descriptionCounter.classList.add("warning");
            }
            if(length>=7800){
                descriptionCounter.classList.remove("warning");
                descriptionCounter.classList.add("danger");
            }
        }
        description.addEventListener("input", updateDescriptionCounter);
        description.addEventListener("keydown",e=>{
            if(
                description.value.length>=description.maxLength &&
                e.key.length===1 &&
                !e.ctrlKey &&
                !e.metaKey &&
                !e.altKey
            ){
                descriptionCounter.classList.remove("flash");
                void descriptionCounter.offsetWidth;
                descriptionCounter.classList.add("flash");
            }
        });
        updateDescriptionCounter();
        coverInput.onchange=()=>{
            if(!coverInput.files.length)
                return;
            const file=coverInput.files[0];
            cropImage.src=URL.createObjectURL(file);
            cropModal.classList.remove("hidden");
            cropImage.onload=()=>{
                cropper?.destroy();
                cropper=new Cropper(cropImage,{
                    aspectRatio:3/4,
                    viewMode:1,
                    dragMode:"move",
                    autoCropArea:1,
                    movable:true,
                    zoomable:true,
                    scalable:false,
                    rotatable:false,
                    guides:true,
                    center:true,
                    background:false,
                    responsive:true,
                    touchDragZoom:true
                });
            };
        };
        cropCancel.onclick=()=>{
            cropper?.destroy();
            cropper = null;
            cropModal.classList.add("hidden");
            croppedCoverFile = null;
            coverInput.value = "";
        };
        cropConfirm.onclick=()=>{
            if(!cropper){
                showError(
                    "Cover Error",
                    "Please crop the cover before continuing."
                );
                return;
            }
            const canvas=cropper.getCroppedCanvas({
                width:900,
                height:1200,
                imageSmoothingQuality:"high"
            });
            if(!canvas){
                showError(
                    "Cover Error",
                    "Unable to crop the selected cover image."
                );
                return;
            }
            canvas.toBlob(blob=>{
                if(!blob){
                    showError(
                        "Cover Error",
                        "Unable to process the cropped cover image."
                    );
                    return;
                }
                croppedCoverFile = new File(
                    [blob],
                    "cover.jpg",
                    {
                        type:"image/jpeg"
                    }
                );
                const previewURL = URL.createObjectURL(blob);
                coverContent.innerHTML = `
                    <img
                        src="${previewURL}"
                        style="
                            width:100%;
                            height:100%;
                            object-fit:cover;
                            border-radius:24px;
                        ">
                `;
                cropModal.classList.add("hidden");
                cropper.destroy();
                cropper = null;
            },"image/jpeg",0.92);
        };
        document.addEventListener("click",e=>{
            if(
                !authorInput.contains(e.target)
                &&
                !authorDropdown.contains(e.target)
            ){
                authorDropdown.classList.remove("open");
                authorInput.parentElement.classList.remove("open");
            }
        });
        document.addEventListener("click",(e)=>{
            if(
                !genreContainer.contains(e.target)
                &&
                !genreDropdown.contains(e.target)
            ){
                genreDropdown.classList.remove("open");

                genreContainer
                    .closest(".author-field")
                    .classList.remove("open");
            }
        });
        document.addEventListener("click",(e)=>{
            if(
                !tagContainer.contains(e.target)
                &&
                !tagDropdown.contains(e.target)
            ){
                tagDropdown.classList.remove("open");
                tagContainer
                    .closest(".author-field")
                    .classList.remove("open");
            }
        });
        function showError(title,message){
            document.getElementById("errorTitle").textContent=title;
            document.getElementById("errorMessage").textContent=message;
            document.getElementById("errorModal").classList.remove("hidden");
        }
        document
        .getElementById("closeErrorModal")
        .onclick=()=>{
            document
                .getElementById("errorModal")
                .classList.add("hidden");
        };
        function validateUpload(){
            const bookName=document
                .getElementById("bookName")
                .value
                .trim();
            const chapterNumber=parseInt(
                chapterInput.value.trim(),
                10
            );

            if(!croppedCoverFile){
                showError(
                    "Missing Cover",
                    "Please upload and crop a book cover"
                );
                return false;
            }
            if(!epubInput.files.length){
                showError(
                    "Missing EPUB",
                    "Please select an EPUB file"
                );
                return false;
            }
            if(
                !document
                    .getElementById("bookName")
                    .value
                    .trim()
            ){
                showError(
                    "Missing Book Name",
                    "Please enter the book name"
                );
                return false;
            }
            if(
                !authorInput.value.trim()
            ){
                showError(
                    "Missing Author",
                    "Please enter the author's name"
                );
                return false;
            }
            if(
                !chapterInput.value.trim()
            ){
                showError(
                    "Missing Chapter Number",
                    "Please enter the latest or last chapter number"
                );
                return false;
            }
            if(
                !document.querySelector("#originBtn")
                    .closest(".custom-select")
                    .dataset.value
            ){
                showError(
                    "Missing Origin",
                    "Please select the book's origin"
                );
                return false;
            }
            if(
                !document.querySelector("#categoryBtn")
                    .closest(".custom-select")
                    .dataset.value
            ){
                showError(
                    "Missing Category",
                    "Please select a category"
                );
                return false;
            }
            if(
                !document.querySelector("#statusBtn")
                    .closest(".custom-select")
                    .dataset.value
            ){
                showError(
                    "Missing Status",
                    "Please select the book status"
                );
                return false;
            }
            if(
                !document.querySelector("#languageBtn")
                    .closest(".custom-select")
                    .dataset.value
            ){
                showError(
                    "Missing Language",
                    "Please select a language"
                );
                return false;
            }
            if(selectedGenres.length===0){
                showError(
                    "Missing Genre",
                    "Please add at least one genre"
                );
                return false;
            }
            if(selectedTags.length===0){
                showError(
                    "Missing Tag",
                    "Please add at least one tag"
                );
                return false;
            }
            const description=document
                .getElementById("description")
                .value
                .trim();
            if(description.length<10){
                showError(
                    "Description Too Short",
                    "Description must contain at least 10 characters"
                );
                return false;
            }
            if(!Number.isInteger(chapterNumber) || chapterNumber<=0){
                showError(
                    "Invalid Chapter Number",
                    "Chapter number must be greater than zero"
                );
                return false;
            }
            if(bookName.length>200){
                showError(
                    "Book Name Too Long",
                    "Book name cannot exceed 200 characters"
                );
                return false;
            }
            if(authorInput.value.trim().length>100){
                showError(
                    "Author Name Too Long",
                    "Author name cannot exceed 100 characters"
                );
                return false;
            }
            return true;
        }
        function createBookId(name){
            return name
                .normalize("NFKD")
                .replace(/[\u0300-\u036f]/g,"")
                .toLowerCase()
                .replace(/[^a-z0-9]/g,"");
        }
        const uploadBookBtn=document.getElementById("uploadBookBtn");
        uploadBookBtn.onclick=async()=>{
            if(!validateUpload()){
                return;
            }
            const user=auth.currentUser;
            if(!user){
                showError(
                    "Not Logged In",
                    "Please sign in again before uploading."
                );
                return;
            }
            const coverFile = croppedCoverFile;
            const epubFile = epubInput.files[0];
            if(!coverFile || !epubFile){
                showError(
                    "Missing Files",
                    "Cover and EPUB are required."
                );
                return;
            }
            const bookName=document.getElementById("bookName").value.trim();
            const authorName=document.getElementById("authorName").value.trim();
            const category=document.querySelector("#categoryBtn")
                .closest(".custom-select")
                .dataset.value || "";
            const language=document.querySelector("#languageBtn")
                .closest(".custom-select")
                .dataset.value || "";
            const origin=document.querySelector("#originBtn")
                .closest(".custom-select")
                .dataset.value || "";
            const status=document.querySelector("#statusBtn")
                .closest(".custom-select")
                .dataset.value || "";
            const chapterNumber=parseInt(
                chapterInput.value || "0",
                10
            );
            const description=document
                .getElementById("description")
                .value
                .trim();
            const now=Date.now();
            const formData=new FormData();
            formData.append(
                "cover",
                coverFile,
                coverFile.name
            );
            formData.append(
                "epub",
                epubFile,
                epubFile.name
            );
            formData.append(
                "bookId",
                createBookId(bookName)
            );
            formData.append(
                "bookName",
                bookName
            );
            formData.append(
                "authorName",
                authorName
            );
            formData.append(
                "category",
                category
            );
            formData.append(
                "chapterNumber",
                chapterNumber
            );
            formData.append(
                "description",
                description
            );
            formData.append(
                "downloads",
                0
            );
            formData.append(
                "views",
                0
            );
            formData.append(
                "mainGenre",
                selectedGenres[0] || ""
            );
            formData.append(
                "genres",
                JSON.stringify(selectedGenres.slice(1))
            );
            formData.append(
                "alternateTitles",
                JSON.stringify(alternateTitles)
            );
            formData.append(
                "language",
                language
            );
            formData.append(
                "origin",
                origin
            );
            formData.append(
                "status",
                status
            );
            formData.append(
                "tags",
                JSON.stringify(selectedTags)
            );
            formData.append(
                "createdAt",
                now
            );
            formData.append(
                "updatedAt",
                now
            );
            formData.append(
                "uploaderUid",
                user.uid
            );
            setUploadButtonLoading();
            try{
                const token = await user.getIdToken();
                const response=await fetch(
                    "https://immortal-library-backend.onrender.com/upload-epub",
                    {
                        method:"POST",
                        headers:{
                            Authorization:`Bearer ${token}`
                        },
                        body:formData
                    }
                );
                const result=await response.json().catch(()=>({
                    success:false,
                    message:"Invalid server response."
                }));
                if(response.ok && result.success){
                    setUploadButtonSuccess();
                    await new Promise(resolve=>setTimeout(resolve,2000));
                    errorTitle.style.color="var(--gold)";
                    errorTitle.textContent="Upload Complete";
                    errorMessage.textContent=result.message;
                    errorModal.classList.remove("hidden");
                    resetUploadButton();
                }else{
                    resetUploadButton();
                    errorTitle.style.color="#ff6868";
                    errorTitle.textContent="Upload Failed";
                    errorMessage.textContent=
                        result.message || "Upload failed.";
                    errorModal.classList.remove("hidden");
                }
            }catch(err){
                console.error(err);
                resetUploadButton();
                errorTitle.style.color="#ff6868";
                errorTitle.textContent="Upload Failed";
                errorMessage.textContent=
                    err.message || "Unexpected error.";
                errorModal.classList.remove("hidden");
            }
        };
    }
   
    document.addEventListener("click",()=>{
        document.querySelectorAll(".dropdown-menu").forEach(menu=>{
            menu.classList.remove("open");
        });
        document.querySelectorAll(".select-btn").forEach(btn=>{
            btn.classList.remove("open");
        });
    });

    mobileLayout();
    window.addEventListener("resize",mobileLayout);

    mobileHome.onclick=()=>{
        window.location.href="/index";
    };

    closeSidebar.onclick=()=>{
        sidebar.classList.remove("open");
    };

    menuBtn.onclick=()=>{
        if(window.innerWidth<=900){
            sidebar.classList.toggle("open");
        }else{
            window.location.href="/index";
        }
    };

</script>

<script src="./src/copper.min.js"></script>

</body>
</html>
