<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload EPUB • Immortal Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/x-icon" href="assets/icon.ico">
<link rel="shortcut icon" href="assets/icon.ico">
<style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    :root{
        --bg:#090909;
        --bg2:#111111;
        --card:#171717;
        --card2:#1d1d1d;
        --gold:#d7b56d;
        --gold2:#f0d28a;
        --text:#ececec;
        --muted:#aaaaaa;
        --border:rgba(255,255,255,.08);
    }

    html{
        scroll-behavior:smooth;
    }

    main{
        margin-top:72px;
        min-height:calc(100vh - 72px);
        padding:70px 0;
        background:url("assets/bg(upload1).jpg");
        background-size:cover;
        background-position:center;
        background-repeat:no-repeat;
    }

    body{
        visibility:hidden;
        background:#090909;
        color:var(--text);
        font-family:Inter,sans-serif;
    }

    body::before{
        content:"";
        position:fixed;
        inset:0;
        background:
            radial-gradient(circle at top,rgba(255,220,130,.05),transparent 35%),
            radial-gradient(circle at bottom,rgba(255,255,255,.02),transparent 40%);
        pointer-events:none;
        z-index:-2;
    }

    body::after{
        content:"";
        position:fixed;
        inset:0;
        background-image:
            radial-gradient(rgba(255,255,255,.03) 1px,transparent 1px);
        background-size:42px 42px;
        opacity:.25;
        pointer-events:none;
        z-index:-1;
    }

    nav{
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:72px;
        display:flex;
        justify-content:space-between;
        align-items:center;
        padding:0 70px;
        background:rgba(10,10,10,.82);
        backdrop-filter:blur(14px);
        border-bottom:1px solid var(--border);
        z-index:1000;
    }

    .nav-left{
        display:flex;
        gap:16px;
        align-items:center;
    }

    .nav-right{
        display:flex;
        align-items:center;
        gap:16px;
    }

    .nav-btn{
        text-decoration:none;
        color:#d7d7d7;
        padding:11px 22px;
        border-radius:30px;
        transition:.25s;
        font-weight:500;
    }

    .nav-btn:hover{
        transform: translateY(-1px);
    }

    .active{
        background:var(--gold);
        color:black;
    }

    footer{
        padding:70px;
        text-align:center;
        border-top:1px solid rgba(255,255,255,.08);
        color:#888;
    }

    .modal{
        position:fixed;
        inset:0;
        display:flex;
        justify-content:center;
        align-items:center;
        background:rgba(0,0,0,.75);
        backdrop-filter:blur(10px);
        z-index:9999;
    }

    .hidden{
        display:none;
    }

    .modal-card{
        width:420px;
        max-width:90%;
        background:#151515;
        border:1px solid rgba(255,255,255,.08);
        border-radius:20px;
        padding:35px;
        text-align:center;
    }

    .modal-card h2{
        margin-bottom:10px;
    }

    .modal-card p{
        color:#aaa;
        margin-bottom:25px;
    }

    #googleLogin{
        width:100%;
        display:flex;
        align-items:center;
        justify-content:center;
        gap:12px;
        padding:14px;
        background:white;
        color:black;
        border:none;
        border-radius:12px;
        font-weight:600;
        font-size:15px;
        cursor:pointer;
        transition:
            background .2s,
            transform .15s,
            box-shadow .2s;
    }

    #googleLogin:hover{
        background:#f2f2f2;
        transform:translateY(-2px);
        box-shadow:0 8px 24px rgba(255,255,255,.12);
    }

    #googleLogin:active{
        transform:scale(.97);
        background:#e8e8e8;
    }

    #googleLogin img{
        width:24px;
    }

    #closeModal{
        margin-top:15px;
        width:100%;
        padding:12px;
        background:#222;
        color:white;
        border:none;
        border-radius:12px;
        font-weight:500;
        cursor:pointer;
        transition:
            background .2s,
            transform .15s,
            box-shadow .2s;
    }

    #closeModal:hover{
        background:#2f2f2f;
        transform:translateY(-2px);
        box-shadow:0 8px 24px rgba(0,0,0,.35);
    }

    #closeModal:active{
        transform:scale(.97);
        background:#1a1a1a;
    }

    .admin-avatar{
        width:100%;
        height:100%;
        border-radius:50%;
        object-fit:cover;
        display:block;
    }

    .profile-btn{
        width:46px;
        height:46px;
        padding:0;
        border:none;
        background:transparent;
        border-radius:50%;
        overflow:hidden;
        display:flex;
        justify-content:center;
        align-items:center;
        cursor:pointer;
        transition:.2s;
    }

    .profile-btn:hover{
        transform:translateY(-2px);
        box-shadow:0 0 24px rgba(215,181,109,.18);
    }

    .profile-btn:active{
        transform:scale(.95);
    }

    #googleLogin:disabled{
        opacity:.6;
        cursor:not-allowed;
    }

    .icon-btn{
        width:44px;
        height:44px;
        display:flex;
        justify-content:center;
        align-items:center;
        border:none;
        background:transparent;
        color:var(--gold);
        border-radius:50%;
        cursor:pointer;
        transition:.2s;
        font-size: 24px;
    }

    .icon-btn:active{
        transform:scale(.94);
    }

    .profile-btn.hidden{
        display:none;
    }

    .nav-right{
        position:relative;
    }

    .profile-menu{
        position:absolute;
        top:75px;
        right:65px; 
        width:260px;
        background:#181818;
        border:1px solid rgba(255,255,255,.08);
        border-radius:16px;
        overflow:hidden;
        box-shadow:0 18px 50px rgba(0,0,0,.45);
        animation:profileMenu .18s ease;
        z-index:10;
    }

    @keyframes profileMenu{
        from{
            opacity:0;
            transform:translateY(-8px);
        }
        to{
            opacity:1;
            transform:none;
        }
    }

    .profile-menu-user{
        width:100%;
        display:flex;
        align-items:center;
        gap:14px;
        padding:16px;
        background:none;
        border:none;
        border-bottom:2px solid rgba(215,181,109,.22);
        text-align:left;
        cursor:pointer;
        transition:background .18s;
    }

    .profile-menu-user:hover{
        background:rgba(255,255,255,.05);
    }

    .profile-menu-user:active{
        transform:scale(.99);
    }

    .profile-menu-avatar{
        width:48px;
        height:48px;
        border-radius:50%;
        object-fit:cover;
    }

    .profile-menu-name{
        font-weight:600;
        color:white;
        overflow:hidden;
        white-space:nowrap;
        text-overflow:ellipsis;
    }

    .profile-menu-role{
        color:#999;
        font-size:13px;
        margin-top:3px;
    }

    .logout-btn{
        width:100%;
        display:flex;
        align-items:center;
        justify-content:space-between;
        padding:16px;
        background:none;
        border:none;
        color:#ff7777;
        cursor:pointer;
        transition:
            background .18s,
            color .18s,
            transform .15s;
    }

    .logout-btn span{
        font-weight:500;
    }

    .logout-btn svg{
        width:18px;
        height:18px;
        flex-shrink:0;
    }

    .logout-btn:hover{
        background:rgba(255,255,255,.05);
        color:#ff8d8d;
    }

    .logout-btn:active{
        transform:scale(.985);
    }

    .profile-btn{
        transition:
            transform .18s,
            box-shadow .18s,
            border-color .18s;
        border:2px solid transparent;
    }

    .profile-btn:hover{
        border-color:rgba(215,181,109,.55);
        box-shadow:
            0 0 22px rgba(215,181,109,.22);
    }

    .profile-btn:active{
        transform:scale(.94);
    }

    .footer-link{
        text-decoration:underline;
        text-underline-offset:3px;
        transition:
            color .2s,
            opacity .2s,
            text-shadow .2s;
    }

    .privacy-link{
        color:#ff6b6b;
    }

    .privacy-link:hover{
        color:#ff9b9b;
        text-shadow:0 0 8px rgba(255,107,107,.35);
    }

    .terms-link{
        color:#6fb6ff;
    }

    .terms-link:hover{
        color:#9fd1ff;
        text-shadow:0 0 8px rgba(111,182,255,.35);
    }

    .footer-divider{
        margin:0 10px;
        color:#666;
        user-select:none;
    }

    .footer-description{
        color:#999;
        line-height:1.8;
        max-width:700px;
        margin:auto;
        font-size:16px;
    }

    .upload-card{
        width:min(1080px,92%);
        margin:80px auto;
        padding:48px;
        border-radius:28px;
        background:
            linear-gradient(
                180deg,
                rgba(35,55,90,.12),
                rgba(10,18,36,.06)
            );
        backdrop-filter:blur(4px);
        -webkit-backdrop-filter:blur(4px);
        border:3px solid rgba(0, 0, 0, 0.60);
        box-shadow:
            0 40px 100px rgba(0,0,0,.45),
            inset 0 1px rgba(255,255,255,.08),
            0 0 60px rgba(80,140,255,.08);
    }

    .upload-card h1{
        font-family:Cinzel,serif;
        font-size:42px;
        font-weight:600;
        color:var(--gold);
        text-align:center;
        margin-bottom:55px;
        letter-spacing:.6px;
    }

    .upload-grid{
        display:grid;
        grid-template-columns:417px 1fr;
        gap:40px;
        align-items:start;
    }

    .cover-column{
        display:flex;
        justify-content:center;
        align-items:flex-start;
    }

    .cover-preview{
        width:100%;
        aspect-ratio:3/4;
        border-radius:22px;
        background:
            linear-gradient(
                180deg,
                rgba(22,22,22,.78),
                rgba(15,15,15,.82)
            );
        border:2px dashed rgba(215,181,109,.75);
        display:flex;
        flex-direction:column;
        justify-content:center;
        align-items:center;
        overflow:hidden;
        background-size:cover;
        background-position:center;
        background-repeat:no-repeat;
        color:#888;
        cursor:pointer;
        transition:
            transform .22s,
            border-color .22s,
            box-shadow .22s,
            background .22s;
        user-select:none;
    }

    .cover-preview:hover{
        transform:translateY(-4px);
        border-color:rgba(215,181,109,.85);
        background:
            linear-gradient(
                180deg,
                rgba(255,255,255,.05),
                rgba(255,255,255,.02)
            );
        box-shadow:
            0 18px 45px rgba(0,0,0,.35),
            0 0 28px rgba(215,181,109,.14);
    }

    .cover-preview::before{
        content:"📖";
        font-size:58px;
        margin-bottom:18px;
    }

    .cover-preview::after{
        content:"Choose Cover (max. 1MB)";
        font-size:15px;
        color:#aaa;
    }

    .cover-preview.has-cover::before,
    .cover-preview.has-cover::after{
        display:none;
    }

    #coverFile{
        user-select: none;
        display:none;
    }

    .details-column{
        display:flex;
        flex-direction:column;
        gap:22px;
    }

    .details-column input,
    .details-column select,
    #tags,
    #description{
        width:100%;
        background:
            linear-gradient(
                180deg,
                rgba(10,16,28,.92),
                rgba(6,10,18,.95)
            );
        color:white;
        border:2px solid rgba(255,255,255,1);
        border-radius:16px;
        padding:18px 20px;
        font-size:15px;
        outline:none;
        transition:
            border-color .2s,
            box-shadow .2s,
            transform .18s;
    }

    .details-column input:focus,
    #tags:focus,
    #description:focus,
    .custom-dropdown.open .dropdown-selected,
    .custom-dropdown:focus .dropdown-selected{
        border-color:#282626;
        box-shadow:
            0 0 0 4px rgba(255,255,255,.08);
    }

    .details-column input::placeholder,
    #tags::placeholder,
    #description::placeholder{
        color:#8a8a8a;
    }

    #tags{
        margin-top:24px;
    }

    #description{
        margin-top:24px;
        min-height:180px;
        max-height:420px;
        line-height:1.75;
        resize:none;
        overflow-y:auto;
        overflow-x:hidden;
        padding-right:14px;
    }

    .upload-btn{
        margin-top:34px;
        width:100%;
        height:60px;
        border:none;
        border-radius:18px;
        background:
            linear-gradient(
                180deg,
                var(--gold2),
                var(--gold)
            );
        color:black;
        font-size:16px;
        font-weight:700;
        letter-spacing:.4px;
        cursor:pointer;
        transition:
            transform .2s,
            box-shadow .2s;
    }

    .upload-btn:hover{
        transform:translateY(-3px);
        box-shadow:
            0 18px 45px rgba(215,181,109,.25);
    }

    .upload-btn:active{
        transform:scale(.985);
    }

    .upload-btn{
        position:relative;
        display:flex;
        align-items:center;
        justify-content:center;
        gap:12px;
    }

    .upload-btn:disabled{
        cursor:not-allowed;
        opacity:.9;
    }

    .upload-loader{
        width:22px;
        height:22px;
        border:3px solid
            rgba(0,0,0,.18);
        border-top-color:black;
        border-radius:50%;
        animation:
            uploadSpin .8s linear infinite;
    }

    @keyframes uploadSpin{
        to{
            transform:
                rotate(360deg);
        }

    }

    input[type=file]{
        display:none;
    }

    .details-column input,
    .epub-picker,
    .tags-container,
    #description,
    #tags,
    .dropdown-selected{
        border:2px solid rgba(32, 32, 32, 0.92) !important;
        box-shadow:
            inset 0 1px rgba(255,255,255,.08);
    }

    #description::-webkit-scrollbar{
        width:8px;
    }

    #description::-webkit-scrollbar-track{
        background:transparent;
        margin:12px 0;
    }

    #description::-webkit-scrollbar-thumb{
        background:rgba(215,181,109,.55);
        border-radius:999px;
        border:2px solid transparent;
        background-clip:padding-box;
    }

    #description::-webkit-scrollbar-thumb:hover{
        background:rgba(240,210,138,.9);
        background-clip:padding-box;
    }

    #description{
        scrollbar-width:thin;
        scrollbar-color:rgba(215,181,109,.55) transparent;
    }

    .epub-picker{
        display:flex;
        align-items:center;
        gap:18px;
        padding:18px;
        border-radius:16px;
        cursor:pointer;
        transition:.22s;
        background:
            linear-gradient(
                180deg,
                rgba(10,16,28,.92),
                rgba(6,10,18,.95)
            );
    }

    .epub-picker:hover{
        border-color:rgba(215,181,109,.45);
        transform:translateY(-2px);
    }

    .epub-icon{
        font-size:34px;
    }

    .epub-title{
        color:white;
        font-weight:600;
    }

    .epub-name{
        color:#888;
        margin-top:4px;
        font-size:14px;
    }

    .tags-container{
        margin-top:24px;
        display:flex;
        flex-wrap:wrap;
        gap:10px;
        padding:14px;
        border-radius:16px;
        min-height:62px;
        background:
            linear-gradient(
                180deg,
                rgba(10,16,28,.92),
                rgba(6,10,18,.95)
            );
    }

    .tags-container input{
        flex:1;
        min-width:180px;
        border:none;
        background:none;
        outline:none;
        color:white;
        font-size:15px;
    }

    .tag-chip{
        display:flex;
        align-items:center;
        gap:8px;
        padding:8px 14px;
        border-radius:999px;
        background:rgba(215,181,109,.14);
        color:var(--gold);
    }

    .tag-remove{
        cursor:pointer;
        color:#ff8a8a;
        font-weight:bold;
    }

    .genre-main{
        background:linear-gradient(
            180deg,
            var(--gold2),
            var(--gold)
        );
        color:#000;
        font-weight:700;
    }

    .genre-main .tag-remove{
        color:#8b0000;
    }

    .genre-chip{
        background:rgba(90,150,255,.12);
        color:#89b8ff;
    }

    .custom-dropdown{
        position:relative;
        width:100%;
        user-select:none;
        outline:none;
    }

    .dropdown-selected{
        width:100%;
        min-height:58px;
        display:flex;
        align-items:center;
        justify-content:space-between;
        padding:18px 20px;
        background:
            linear-gradient(
                180deg,
                rgba(10,16,28,.92),
                rgba(6,10,18,.95)
            );
        color:white;
        border:2px solid #fff;
        border-radius:16px;
        cursor:pointer;
        transition:
            border-color .22s,
            box-shadow .22s,
            transform .18s;
    }

    .dropdown-selected span{
        color:#8a8a8a;
        overflow:hidden;
        white-space:nowrap;
        text-overflow:ellipsis;
    }

    .custom-dropdown.selected .dropdown-selected span{
        color:white;
    }

    .dropdown-arrow{
        width:18px;
        height:18px;
        color:var(--gold);
        flex-shrink:0;
        transition:
            transform .25s;
    }

    .custom-dropdown.open .dropdown-arrow{
        transform:rotate(180deg);
    }

    .dropdown-menu{
        position:absolute;
        top:calc(100% + 10px);
        left:0;
        width:100%;
        opacity:0;
        visibility:hidden;
        transform:
            translateY(-8px);
        background:
            rgba(24,24,24,.92);
        backdrop-filter:blur(22px);
        border:2px solid rgba(255,255,255,.08);
        border-radius:18px;
        overflow:hidden;
        box-shadow:
            0 20px 55px rgba(0,0,0,.45);
        transition:
            opacity .22s,
            transform .22s,
            visibility .22s;
        z-index:100;
    }

    .custom-dropdown.open .dropdown-menu{
        opacity:1;
        visibility:visible;
        transform:none;
    }

    .dropdown-options{
        max-height:260px;
        overflow-y:auto;
    }

    .dropdown-option{
        padding:14px 18px;
        color:#dddddd;
        cursor:pointer;
        transition:
            background .18s,
            color .18s,
            padding-left .18s;
    }

    .dropdown-option:hover{
        background:
            rgba(215,181,109,.10);
        color:white;
        padding-left:24px;
    }

    .dropdown-option.active{
        background:
            rgba(215,181,109,.16);
        color:var(--gold);
    }

    .dropdown-options::-webkit-scrollbar{
        width:8px;
    }

    .dropdown-options::-webkit-scrollbar-track{
        background:transparent;
    }

    .dropdown-options::-webkit-scrollbar-thumb{
        background:
            rgba(215,181,109,.55);
        border-radius:999px;
    }

    .dropdown-options::-webkit-scrollbar-thumb:hover{
        background:
            rgba(240,210,138,.9);
    }

    .dropdown-options{
        scrollbar-width:thin;
        scrollbar-color:
            rgba(215,181,109,.55)
            transparent;
    }

    #closeErrorModal{
        margin-top:15px;
        width:100%;
        padding:12px;
        background:#222;
        color:white;
        border:none;
        border-radius:12px;
        font-weight:500;
        cursor:pointer;
        transition:
            background .2s,
            transform .15s,
            box-shadow .2s;
    }

    #closeErrorModal:hover{
        background:#2f2f2f;
        transform:translateY(-2px);
        box-shadow:0 8px 24px rgba(0,0,0,.35);
    }

    #closeErrorModal:active{
        transform:scale(.97);
        background:#1a1a1a;
    }


    @media(max-width:900px){
        .dropdown-menu{
            width:100%;
        }
    }

    .description-counter{
        margin-top:8px;
        text-align:right;
        color:#000000;
        font-size:13px;
        user-select:none;
    }

    @media(max-width:900px){
        nav{
            height:58px;
            padding:0 14px;
        }
        .nav-left{
            gap:8px;
        }
        .nav-right{
            gap:8px;
        }
        .nav-btn{
            padding:8px 14px;
            font-size:14px;
        }
        .profile-btn{
            width:38px;
            height:38px;
        }
        .admin-avatar{
            width:100%;
            height:100%;
        }
        footer{
            padding:45px 24px;
        }
        #googleLogin:hover,
        #closeModal:hover{
            transform:none;
            box-shadow:none;
        }
        #googleLogin:active{
            transform:scale(.96);
            background:#e6e6e6;
        }
        #closeModal:active{
            transform:scale(.96);
            background:#191919;
        }
        .icon-btn:hover{
            transform:none;
            box-shadow:none;
        }
        .icon-btn:active{
            transform:scale(.95);
        }
        #closeErrorModal:hover{
            transform:none;
            box-shadow:none;
        }
        #closeErrorModal:active{
            transform:scale(.96);
        }
        .icon-btn{
            width:38px;
            height:38px;
        }
        .icon-btn svg{
            width:18px;
            height:18px;
        }
        .profile-menu{
            top:60px;
            right:15px;
            width:230px;
        }
        .profile-menu-user{
            padding:14px;
        }
        .logout-btn{
            padding:15px;
        }
        main{
            margin-top:58px;
            padding:30px 0;
        }

    let openedDropdown = null;

    class CustomDropdown {
        constructor(selector, items){
            this.root = document.querySelector(selector);
            this.items = items;
            this.filtered = [...items];
            this.selected = "";
            this.highlight = -1;
            this.selectedBox = this.root.querySelector(".dropdown-selected");
            this.label = this.selectedBox.querySelector("span");
            this.menu = this.root.querySelector(".dropdown-menu");
            this.options = this.root.querySelector(".dropdown-options");
            this.render();
            this.bindEvents();
        }
        render(){
            this.options.innerHTML = "";
            this.items.forEach(text=>{
                const option = document.createElement("div");
                option.className = "dropdown-option";
                option.textContent = text;
                option.dataset.value = text;
                if(text===this.selected){
                    option.classList.add("active");
                }
                this.options.appendChild(option);
            });
        }
        bindEvents(){
            this.selectedBox.addEventListener(
                "click",
                e=>{
                    e.stopPropagation();
                    if(
                        openedDropdown &&
                        openedDropdown!==this
                    ){
                        openedDropdown.close();
                    }
                    this.toggle();
                }
            );
            this.options.addEventListener(
                "click",
                e=>{
                    const option =
                        e.target.closest(".dropdown-option");
                    if(!option) return;
                    this.choose(
                        option.dataset.value
                    );
                }
            );
            this.root.addEventListener(
                "keydown",
                e=>this.handleKey(e)
            );
        }
        toggle(){
            if(this.root.classList.contains("open")){
                this.close();
            }else{
                this.open();
            }
        }
        open(){
            this.root.classList.add("open");
            openedDropdown = this;
            this.render();
            this.highlight = -1;
        }
        close(){
            this.root.classList.remove("open");
            if(openedDropdown===this){
                openedDropdown=null;
            }
        }
        choose(value){
            this.selected = value;
            this.label.textContent = value;
            this.root.classList.add("selected");
            this.render();
            this.close();
            if (this.root.id === "statusDropdown") {
                if (value === "Completed" || value === "Dropped") {
                    chapterNumber.placeholder = "Last Chapter Number";
                } else {
                    chapterNumber.placeholder = "Latest Chapter Number";
                }
            }
        }
        setValue(value){
            const match =
                this.items.find(item=>
                    item.toLowerCase()
                        .includes(value.toLowerCase())
                );
            if(!match) return;
            this.choose(match);
        }
        handleKey(e){
            if(!this.root.classList.contains("open")) return;
            const options = [...this.options.querySelectorAll(".dropdown-option")];
            if(!options.length) return;
            switch(e.key){
                case "ArrowDown":
                    e.preventDefault();
                    this.highlight = Math.min(this.highlight + 1, options.length - 1);
                    break;
                case "ArrowUp":
                    e.preventDefault();
                    this.highlight = Math.max( this.highlight - 1, 0 );
                    break;
                case "Enter":
                    e.preventDefault();
                    if(this.highlight >= 0){
                        options[this.highlight].click();
                    }
                    return;
                case "Escape":
                    this.close();
                    return;
                default:
                    return;
            }
            options.forEach(o=>o.classList.remove("active"));
            options[this.highlight].classList.add("active");
            options[this.highlight].scrollIntoView({
                block:"nearest"
            });
        }
    }

    async function readEpubMetadata(file){
        const zip = await JSZip.loadAsync(file);
        const containerFile = zip.file("META-INF/container.xml");
        if(!containerFile){
            throw new Error("container.xml not found.");
        }
        const parser = new DOMParser();
        const containerDoc = parser.parseFromString(
            await containerFile.async("string"),
            "application/xml"
        );
        const rootfile =
            containerDoc.getElementsByTagName("rootfile")[0];
        if(!rootfile){
            throw new Error("Root OPF not found.");
        }
        const opfPath = rootfile.getAttribute("full-path");
        const opfFile = zip.file(opfPath);
        if(!opfFile){
            throw new Error("Package document not found.");
        }
        const opfDoc = parser.parseFromString(
            await opfFile.async("string"),
            "application/xml"
        );
        const metadata = opfDoc.getElementsByTagName("metadata")[0];
        if(!metadata){
            throw new Error("Metadata section missing.");
        }
        function first(...names){
            for(const name of names){
                const node = metadata.getElementsByTagName(name)[0];
                if(node?.textContent?.trim()){
                    return node.textContent.trim();
                }
            }
            return "";
        }
        function all(...names){
            const result = [];
            for(const name of names){
                const nodes = metadata.getElementsByTagName(name);
                for(const node of nodes){
                    const value = node.textContent.trim();
                    if(
                        value &&
                        !result.includes(value)
                    ){
                        result.push(value);
                    }
                }
            }
            return result;
        }
        return{
            title:
                first(
                    "dc:title",
                    "title"
                ),
            author:
                first(
                    "dc:creator",
                    "creator"
                ),
            language:
                first(
                    "dc:language",
                    "language"
                ),
            description:
                first(
                    "dc:description",
                    "description"
                ),
            publisher:
                first(
                    "dc:publisher",
                    "publisher"
                ),
            identifier:
                first(
                    "dc:identifier",
                    "identifier"
                ),
            date:
                first(
                    "dc:date",
                    "date"
                ),
            rights:
                first(
                    "dc:rights",
                    "rights"
                ),
            subjects:
                all(
                    "dc:subject",
                    "subject"
                )
        };
    }

    const alternateTitles = [];

            value = value.slice(0, -1).trim();
        }
        if (!value) {
            genreInput.value = "";

        if (value.length > 25) {
            genreInput.value = "";

            return;
        }
        if (genres.length >= 5) {
            genreInput.value = "";

            return;
        }
        const normalized = value.toLowerCase();
        if (genres.includes(normalized)) {

            return;
        }
        genres.push(normalized);
        const chip = document.createElement("div");

        genresContainer.insertBefore(chip, genreInput);
        refreshGenreStyles();
        genreInput.value = "";

    const tags = [];
    tagInput.maxLength = 25;
    function addTag() {
        let value = tagInput.value.trim();
        if (value.endsWith(",")) {
            value = value.slice(0, -1).trim();
        }
        if (!value) {
            tagInput.value = "";
            return;
        }
        if (value.length > 25) {
            tagInput.value = "";
            alert("Each tag may contain at most 25 characters.");
            return;

        if (tags.length >= 20) {
            tagInput.value = "";
            alert("Maximum of 20 tags allowed.");
            return;
        }
        if (tags.includes(value.toLowerCase())) {
            tagInput.value = "";
            return;
        }
        tags.push(value.toLowerCase());
        const chip = document.createElement("div");
        chip.className = "tag-chip";
        chip.innerHTML = `
            ${value}
            <span class="tag-remove">✕</span>
        `;
        chip.querySelector(".tag-remove").onclick = () => {
            tags.splice(tags.indexOf(value.toLowerCase()), 1);
            chip.remove();
        };
        tagsContainer.insertBefore(chip, tagInput);
        tagInput.value = "";
    }

    tagInput.addEventListener("input", () => {
        if (tagInput.value.endsWith(",")) {
            addTag();
        }
    });

    tagInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
            e.preventDefault();
            addTag();
        }
    });

    coverFile.onchange = () => {
        if(!coverFile.files.length) return;
        const file = coverFile.files[0];
        if(!file.type.startsWith("image/")){
            coverFile.value = "";
            showError(
                "Invalid Book Cover",
                "Only image files can be used as book covers."
            );
            return;
        }
        if(file.size > 1024 * 1024){
            coverFile.value = "";
            showError(
                "Image Too Large",
                "Book cover images must not exceed 1 MB."
            );
            return;
        }
        const reader = new FileReader();
        reader.onload = e => {
            coverPreview.style.backgroundImage = `url(${e.target.result})`;
            coverPreview.style.backgroundSize = "cover";
            coverPreview.style.backgroundPosition = "center";
            coverPreview.style.backgroundRepeat = "no-repeat";
            coverPreview.classList.add("has-cover");
        };
        reader.readAsDataURL(file);
    };

    epubFile.onchange = async () => {
        if(!epubFile.files.length){
            epubName.textContent = "No EPUB Selected";
            return;
        }
        const file = epubFile.files[0];
        const isEPUB =
            file.name.toLowerCase().endsWith(".epub") ||
            file.type === "application/epub+zip";
        if(!isEPUB){
            epubFile.value = "";
            epubName.textContent = "No EPUB Selected";
            showError(
                "Invalid EPUB",
                "Only EPUB files can be imported"
            );
            return;
        }
        epubName.textContent = file.name;
        try{
            const meta = await readEpubMetadata(file);
            const title = document.getElementById("bookTitle");
            const author = document.getElementById("bookAuthor");
            if(
                isEmpty(title) &&
                meta.title
            ){
                title.value =
                    meta.title;
            }
            if(
                isEmpty(author) &&
                meta.author
            ){
                author.value =
                    meta.author;
            }
            if(
                isDescriptionEmpty() &&
                meta.description
            ){
                description.value =
                    meta.description;
                descriptionCount.textContent =
                    meta.description.length;
            }
            if(
                !languageDropdown.selected &&
                meta.language
            ){
                languageDropdown.setValue(
                    meta.language
                );
            }
        }
        catch(err){
            console.error(
                "Metadata read failed",
                err
            );
        }
    };

    function showLoggedIn(profile,isOwner){
        profileBtn.classList.remove("hidden");
        profileBtn.innerHTML=`
            <img src="${profile.avatar}" class="admin-avatar">
        `;
        menuAvatar.src=profile.avatar;
        menuName.textContent=profile.displayName;
        menuRole.textContent=isOwner ? "Owner" : "Administrator";
    }

    onAuthStateChanged(auth, async (user) => {
        try {
            if (!user) {
                window.location.href = "/index";
                return;
            }
            const adminDoc = await getDoc(
                doc(db, "admins", user.email.toLowerCase())
            );
            if (!adminDoc.exists()) {
                await signOut(auth);
                window.location.href = "/index";
                return;
            }
            const profileDoc = await getDoc(
                doc(db, "userdata", user.uid)
            );
            if (!profileDoc.exists()) {
                throw new Error("User profile not found.");
            }
            showLoggedIn(
                profileDoc.data(),
                adminDoc.data().owner === true
            );
            document.body.style.visibility = "visible";
        }
        catch (err) {
            console.error(err);
            window.location.href = "/index";
        }
    });

    profileBtn.onclick = (e) => {
        e.stopPropagation();
        const openMenu = () => {
            ignoreScrollUntil = Date.now() + 400;
            profileMenu.classList.remove("hidden");
        };
        if (window.scrollY > 30) {
            window.scrollTo({
                top: 0,
                behavior: "smooth"
            });
            const waitForTop = () => {
                if (window.scrollY <= 5) {
                    openMenu();
                } else {
                    requestAnimationFrame(waitForTop);
                }
            };
            requestAnimationFrame(waitForTop);
        } else {
            profileMenu.classList.toggle("hidden");
        }
    };

    document.addEventListener("click", (e) => {
        if (
            !profileMenu.contains(e.target) &&
            !profileBtn.contains(e.target)
        ) {
            profileMenu.classList.add("hidden");
        }
    });

    window.addEventListener("scroll", () => {
        if (Date.now() < ignoreScrollUntil) return;
        if (!profileMenu.classList.contains("hidden")) {
            profileMenu.classList.add("hidden");
        }
    });

    logoutBtn.onclick = async () => {
        await signOut(auth);
        window.location.href = "/index";
    };

    profilePageBtn.onclick=()=>{
        window.location.href="/profile";
    };

    menuBtn.onclick = () => {
        window.location.href = "/index";
    };

    uploadBtn.onclick = async () => {
        const upload = createUploadObject();
        upload.bookId = await getUniqueBookId(
            upload.bookId
        );
        if(
            !upload.bookName ||
            !upload.authorName ||
            !upload.chapterNumber ||
            !upload.language ||
            !upload.category ||
            !upload.status ||
            !upload.mainGenre ||
            !upload.tags ||
            !upload.description ||
            !upload.coverFile ||
            !upload.epubFile
        ){
            showError(
                "Missing Information",
                "Please fill every required field and select both the cover image and EPUB."
            );
            return;
        }
        startUpload();
        try{
            const formData = new FormData();
            formData.append(
                "cover",
                upload.coverFile
            );
            formData.append(
                "epub",
                upload.epubFile
            );
            formData.append(
                "metadata",
                JSON.stringify({
                    bookId: upload.bookId,
                    bookName: upload.bookName,
                    authorName: upload.authorName,
                    chapterNumber: upload.chapterNumber,
                    language: upload.language,
                    category: upload.category,
                    status: upload.status,
                    mainGenre: upload.mainGenre,
                    genres: upload.genres,
                    alternateTitles: upload.alternateTitles,
                    tags: upload.tags,
                    description: upload.description
                })
            );
            setUploadStatus("Uploading EPUB...");
            const user = auth.currentUser;
            if (!user) {
                throw new Error("You are not signed in.");
            }
            const token = await auth.currentUser.getIdToken();
            const response = await fetch(
                "https://immortal-library-backend.onrender.com/upload",
                {
                    method: "POST",
                    headers: {
                        Authorization: `Bearer ${token}`
                    },
                    body: formData
                }
            );
            const result = await response.json();
            if(!response.ok){
                throw new Error(
                    result.error || "Upload failed."
                );
            }
            setUploadStatus("Saving Metadata...");
            await setDoc(
                doc(
                    db,
                    "epubs",
                    upload.bookId
                ),
                {
                    uploaderUid: auth.currentUser.uid,
                    bookId: upload.bookId,
                    bookName: upload.bookName,
                    authorName: upload.authorName,
                    chapterNumber: upload.chapterNumber,
                    language: upload.language,
                    category: upload.category,
                    status: upload.status,
                    mainGenre: upload.mainGenre,
                    genres: upload.genres,
                    alternateTitles: upload.alternateTitles,
                    tags: upload.tags,
                    description: upload.description,
                    coverUrl: result.coverUrl,
                    epubUrl: result.epub.viewUrl,
                    epubDownloadUrl: result.epub.downloadUrl,
                    views: 0,
                    downloads: 0,
                    featuredPosition: null,
                    createdAt: serverTimestamp(),
                    updatedAt: serverTimestamp()
                }
            );
            finishUpload();
            resetUploadForm();
        }
        catch(err){
            console.error(err);
            console.error(err.code);
            console.error(err.message);
            console.error(err.stack);
            showError(
                "Upload Failed",
                `${err.code}\n${err.message}`
            );
            resetUpload();
        }
    };

</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
