            if(!user){

                return;
            }
            const adminDoc = await getDoc(
                doc(db, "admins", user.email.toLowerCase())

        const uploadBtn=document.getElementById("uploadBookBtn");
        function updateChapterField(){
            const category = categorySelect.dataset.value;
            const status = statusSelect.dataset.value;

                chapterLabel.textContent = "DISABLED";

                chapterInput.disabled = true;
                return;
            }
            chapterInput.disabled = false;
            const finished =
                status === "Completed" ||
                status === "Dropped";

        function setUploadButtonLoading(){
            uploadBtn.disabled=true;

            `;
        }
        function setUploadButtonSuccess(){
            uploadBtn.classList.remove("loading");
            uploadBtn.classList.add("success");
            uploadBtn.innerHTML="✓ Done";
        }

            uploadBtn.disabled=false;
            uploadBtn.classList.remove("loading","success");
            uploadBtn.textContent="Upload EPUB";
        }
        const selectedTags=[];
        let tagIndex=-1;
        function titleCase(text){
            const keepLower=new Set([
                "a",
                "an",
                "and",
                "as",
                "at",
                "but",
                "by",
                "for",
                "from",
                "if",
                "in",
                "into",
                "is",
                "nor",
                "of",
                "off",
                "on",
                "onto",
                "or",
                "out",
                "over",
                "per",
                "so",
                "than",
                "the",
                "to",
                "under",
                "up",
                "upon",
                "via",
                "with",
                "yet"
            ]);
            const keepUpper=new Set([
                "op",
                "mc",
                "npc",
                "hp",
                "mp",
                "ssr",
                "sr",
                "ur",
                "r",
                "s",
                "ss",
                "sss",
                "vr",
                "ar",
                "mmorpg",
                "rpg",
                "pvp",
                "pve",
                "ai",
                "vrmmo",
                "usa",
                "uk",
                "eu",
                "jp",
                "kr",
                "cn",
                "id"
            ]);
            return text
                .toLowerCase()
                .split(/\s+/)
                .map((word,index)=>{
                    if(keepUpper.has(word)){
                        return word.toUpperCase();
                    }
                    if(
                        index!==0 &&
                        keepLower.has(word)
                    ){
                        return word;
                    }
                    return word.charAt(0).toUpperCase()+word.slice(1);
                })
                .join(" ");
        }
        document.querySelectorAll(".custom-select").forEach(select=>{
            const btn=select.querySelector(".select-btn");
            const menu=select.querySelector(".dropdown-menu");
            const text=select.querySelector(".select-text");
            btn.onclick=(e)=>{
                e.stopPropagation();
                document.querySelectorAll(".dropdown-menu.open").forEach(m=>{
                    if(m!==menu){
                        m.classList.remove("open");
                        m.parentElement.querySelector(".select-btn").classList.remove("open");
                    }
                });
                menu.classList.toggle("open");
                btn.classList.toggle("open");
            };
            menu.querySelectorAll(".dropdown-option").forEach(option=>{
                option.onclick=()=>{
                    text.textContent=option.dataset.value;
                    menu.classList.remove("open");
                    btn.classList.remove("open");

        epubInput.onchange=()=>{
            if(!epubInput.files.length){
                epubTitle.textContent="Import EPUB";

            }

            epubFileName.textContent=epubInput.files[0].name;
        };
        const metadata=JSON.parse(localStorage.getItem("metadata")||"{}");
        const browse=metadata.browse||{};
        const authors=[
            ...new Set(
                Object.values(browse)
                    .map(book=>book.authorName)
                    .filter(Boolean)
            )
        ].sort();
        const genreSuggestions=[
            ...new Set(
                Object.values(browse)
                    .flatMap(book=>[
                        book.mainGenre,
                        ...(book.genres||[])
                    ])
                    .filter(Boolean)
                    .map(titleCase)
            )
        ].sort();
        const tagSuggestions=[
            ...new Set(
                Object.values(browse)
                    .flatMap(book=>book.tags || [])
                    .filter(Boolean)
                    .map(titleCase)
            )
        ].sort();
        function renderAuthors(search=""){
            const s=search.trim().toLowerCase();
            const matches=authors.filter(author=>
                author.toLowerCase().includes(s)
            );
            authorDropdown.innerHTML=matches
                .map(author=>`
                    <div
                        class="author-option"
                        data-author="${author}">
                        ${author}
                    </div>
                `)
                .join("");
            authorIndex=-1;
            const opened = matches.length > 0;
            authorDropdown.classList.toggle("open", opened);
            authorInput.parentElement.classList.toggle("open", opened);
            authorDropdown
                .querySelectorAll(".author-option")
                .forEach(option=>{
                    option.onclick=()=>{
                        authorInput.value=option.dataset.author;
                        authorDropdown.classList.remove("open");
                        authorInput.parentElement.classList.remove("open");
                    };
                });
        }
        authorInput.addEventListener("focus",()=>{
            renderAuthors(authorInput.value);
        });
        authorInput.addEventListener("input",()=>{
            authorIndex=-1;
            renderAuthors(authorInput.value);
        });
        authorInput.addEventListener("keydown",e=>{
            const options=[
                ...authorDropdown.querySelectorAll(".author-option")
            ];
            if(!options.length)
                return;
            if(e.key==="ArrowDown"){
                e.preventDefault();
                authorIndex=Math.min(
                    authorIndex+1,
                    options.length-1
                );
            }
            else if(e.key==="ArrowUp"){
                e.preventDefault();
                authorIndex=Math.max(
                    authorIndex-1,
                    0
                );
            }
            else if(e.key==="Enter"){
                if(authorIndex>=0){
                    e.preventDefault();
                    options[authorIndex].click();
                }
                return;
            }
            options.forEach(o=>o.style.background="");
            options[authorIndex].style.background=
                "rgba(215,181,109,.18)";
            options[authorIndex].scrollIntoView({
                block:"nearest"
            });
        });
        function renderAlternateTitles(){
            alternateContainer
                .querySelectorAll(".alt-chip")
                .forEach(e=>e.remove());
            alternateTitles.forEach((title,index)=>{
                const chip=document.createElement("div");
                chip.className="alt-chip";
                chip.innerHTML=`
                    <span>${title}</span>
                    <button type="button">✕</button>
                `;
                chip.querySelector("button").onclick=()=>{
                    alternateTitles.splice(index,1);
                    renderAlternateTitles();
                };
                alternateContainer.insertBefore(
                    chip,
                    alternateInput
                );
            });
        }
        alternateInput.addEventListener("keydown",e=>{
            if(
                e.key==="Enter"
                ||
                e.key===","
            ){
                e.preventDefault();
                const value=alternateInput.value.trim();
                if(
                    value
                    &&
                    !alternateTitles.includes(value)
                ){
                    alternateTitles.push(value);
                    renderAlternateTitles();
                }
                alternateInput.value="";
            }
        });
        genreInput.addEventListener("focus",()=>{
            renderGenreDropdown(
                genreInput.value
            );
        });
        genreInput.addEventListener("input",()=>{
            renderGenreDropdown(
                genreInput.value
            );
        });
        genreInput.addEventListener("keydown",e=>{
            const options=[
                ...genreDropdown.querySelectorAll(".genre-option")
            ];
            if(e.key==="ArrowDown"){
                e.preventDefault();
                genreIndex=Math.min(
                    genreIndex+1,
                    options.length-1
                );
                options.forEach(o=>o.style.background="");
                if(options[genreIndex]){
                    options[genreIndex].style.background=
                        "rgba(215,181,109,.18)";
                    options[genreIndex].scrollIntoView({
                        block:"nearest"
                    });
                }
                return;
            }
            if(e.key==="ArrowUp"){
                e.preventDefault();
                genreIndex=Math.max(
                    genreIndex-1,
                    0
                );
                options.forEach(o=>o.style.background="");
                if(options[genreIndex]){
                    options[genreIndex].style.background=
                        "rgba(215,181,109,.18)";
                    options[genreIndex].scrollIntoView({
                        block:"nearest"
                    });
                }
                return;
            }
            if(
                e.key==="Enter"
                &&
                genreIndex>=0
            ){
                e.preventDefault();
                options[genreIndex].click();
                return;
            }
            if(
                e.key==="Enter"
                ||
                e.key===","
            ){
                e.preventDefault();
                const value=titleCase(genreInput.value.trim().slice(0,30));
                if(
                    value && !selectedGenres.includes(value) && selectedGenres.length<5
                ){
                    selectedGenres.push(value);
                    renderGenres();
                }
                genreInput.value="";
                renderGenreDropdown();
                genreInput.value="";
                renderGenreDropdown();
                genreDropdown.classList.remove("open");
                genreContainer
                    .closest(".author-field")
                    .classList.remove("open");
            }
        });
        tagInput.addEventListener("focus",()=>{
            renderTagDropdown(tagInput.value);
        });
        tagInput.addEventListener("input",()=>{
            renderTagDropdown(tagInput.value);
        });
        tagInput.addEventListener("keydown",e=>{
            const options=[
                ...tagDropdown.querySelectorAll(".genre-option")
            ];
            if(e.key==="ArrowDown"){
                e.preventDefault();
                tagIndex=Math.min(
                    tagIndex+1,
                    options.length-1
                );
                options.forEach(o=>o.style.background="");
                if(options[tagIndex]){
                    options[tagIndex].style.background=
                        "rgba(215,181,109,.18)";
                    options[tagIndex].scrollIntoView({
                        block:"nearest"
                    });
                }
                return;
            }
            if(e.key==="ArrowUp"){
                e.preventDefault();
                tagIndex=Math.max(
                    tagIndex-1,
                    0
                );
                options.forEach(o=>o.style.background="");
                if(options[tagIndex]){
                    options[tagIndex].style.background=
                        "rgba(215,181,109,.18)";
                    options[tagIndex].scrollIntoView({
                        block:"nearest"
                    });
                }
                return;
            }
            if(
                e.key==="Enter"
                &&
                tagIndex>=0
            ){
                e.preventDefault();
                options[tagIndex].click();
                return;
            }
            if(
                e.key==="Enter"
                ||
                e.key===","
            ){
                e.preventDefault();
                const value=titleCase(
                    tagInput.value
                        .trim()
                        .slice(0,30)
                );
                if(
                    value
                    &&
                    !selectedTags.includes(value)
                    &&
                    selectedTags.length<25
                ){
                    selectedTags.push(value);
                    renderTags();
                }
                tagInput.value="";
                renderTagDropdown();
                tagDropdown.classList.remove("open");
                tagContainer
                    .closest(".author-field")
                    .classList.remove("open");
            }
        });
        function renderGenres(){
            genreContainer
                .querySelectorAll(".genre-chip")
                .forEach(e=>e.remove());
            selectedGenres.forEach((genre,index)=>{
                const chip=document.createElement("div");
                chip.className=
                    index===0
                    ? "genre-chip main"
                    : "genre-chip secondary";
                chip.innerHTML=`
                    <span>${genre}</span>
                    <button type="button">✕</button>
                `;
                chip.querySelector("button").onclick=()=>{
                    selectedGenres.splice(index,1);
                    renderGenres();
                    renderGenreDropdown(
                        genreInput.value
                    );
                    genreInput.focus();
                };
                genreContainer.insertBefore(
                    chip,
                    genreInput
                );
            });
            genreInput.disabled = selectedGenres.length >= 5;
        }
        function renderGenreDropdown(search=""){
            const s=search.toLowerCase();
            const matches = genreSuggestions.filter(g=>
                g.toLowerCase().includes(s)
                &&
                !selectedGenres.includes(g)
            );
            genreDropdown.innerHTML=matches.map(g=>`
                <div
                    class="genre-option"
                    data-genre="${g}">
                    ${g}
                </div>
            `).join("");
            genreIndex=-1;
            const opened = matches.length > 0;
            genreDropdown.classList.toggle(
                "open",
                opened
            );
            genreContainer
                .closest(".author-field")
                .classList.toggle(
                    "open",
                    opened
                );
            genreDropdown
                .querySelectorAll(".genre-option")
                .forEach(option=>{
                    option.onclick=()=>{
                        if(selectedGenres.length>=5)
                            return;
                        selectedGenres.push(
                            titleCase(option.dataset.genre)
                        );
                        genreInput.value="";
                        renderGenres();
                        renderGenreDropdown();
                        genreDropdown.classList.remove("open");
                        genreContainer
                            .closest(".author-field")
                            .classList.remove("open");
                        genreInput.blur();
                    };
                });
        }
        function renderTags(){
            tagContainer
                .querySelectorAll(".tag-chip")
                .forEach(e=>e.remove());
            selectedTags.forEach((tag,index)=>{
                const chip=document.createElement("div");
                chip.className="tag-chip";
                chip.innerHTML=`
                    <span>${tag}</span>
                    <button type="button">✕</button>
                `;
                chip.querySelector("button").onclick=()=>{
                    selectedTags.splice(index,1);
                    renderTags();
                    renderTagDropdown(tagInput.value);
                    tagInput.focus();
                };
                tagContainer.insertBefore(
                    chip,
                    tagInput
                );
            });
            tagInput.disabled=selectedTags.length>=25;
        }
        function renderTagDropdown(search=""){
            const s=search.toLowerCase();
            const matches=tagSuggestions.filter(tag=>
                tag.toLowerCase().includes(s)
                &&
                !selectedTags.includes(tag)
            );
            tagDropdown.innerHTML=matches.map(tag=>`
                <div
                    class="genre-option"
                    data-tag="${tag}">
                    ${tag}
                </div>
            `).join("");
            tagIndex=-1;
            const opened=matches.length>0;
            tagDropdown.classList.toggle("open",opened);
            tagContainer
                .closest(".author-field")
                .classList.toggle("open",opened);
            tagDropdown
                .querySelectorAll(".genre-option")
                .forEach(option=>{
                    option.onclick=()=>{
                        if(selectedTags.length>=25)
                            return;
                        selectedTags.push(
                            titleCase(option.dataset.tag)
                        );
                        tagInput.value="";
                        renderTags();
                        renderTagDropdown();
                        tagDropdown.classList.remove("open");
                        tagContainer
                            .closest(".author-field")
                            .classList.remove("open");
                        tagInput.blur();
                    };
                });
        }
        chapterInput.addEventListener("input",()=>{
            chapterInput.value=chapterInput.value
                .replace(/\D/g,"")
                .slice(0,5);
        });
        document.querySelectorAll(".auto-grow").forEach(textarea=>{
            const resize=()=>{
                textarea.style.height="0px";
                textarea.style.height=textarea.scrollHeight+"px";
            };
            resize();
            textarea.addEventListener("input",resize);
        });
        const description=document.getElementById("description");
        const descriptionCount=document.getElementById("descriptionCount");
        const descriptionCounter=document.querySelector(".description-counter");
        function updateDescriptionCounter(){
            const length=description.value.length;
            descriptionCount.textContent=length;
            descriptionCounter.classList.remove(
                "warning",
                "danger"
            );
            if(length>=7000){
                descriptionCounter.classList.add("warning");
            }
            if(length>=7800){
                descriptionCounter.classList.remove("warning");
                descriptionCounter.classList.add("danger");
            }
        }
        description.addEventListener("input", updateDescriptionCounter);
        description.addEventListener("keydown",e=>{
            if(
                description.value.length>=description.maxLength &&
                e.key.length===1 &&
                !e.ctrlKey &&
                !e.metaKey &&
                !e.altKey
            ){
                descriptionCounter.classList.remove("flash");
                void descriptionCounter.offsetWidth;
                descriptionCounter.classList.add("flash");
            }
        });
        updateDescriptionCounter();
        coverInput.onchange=()=>{
            if(!coverInput.files.length)
                return;
            const file=coverInput.files[0];
            cropImage.src=URL.createObjectURL(file);
            cropModal.classList.remove("hidden");
            cropImage.onload=()=>{
                cropper?.destroy();
                cropper=new Cropper(cropImage,{
                    aspectRatio:3/4,
                    viewMode:1,
                    dragMode:"move",
                    autoCropArea:1,
                    movable:true,
                    zoomable:true,
                    scalable:false,
                    rotatable:false,
                    guides:true,
                    center:true,
                    background:false,
                    responsive:true,
                    touchDragZoom:true
                });
            };
        };
        cropCancel.onclick=()=>{
            cropper?.destroy();
            cropper = null;
            cropModal.classList.add("hidden");
            croppedCoverFile = null;
            coverInput.value = "";
        };
        cropConfirm.onclick=()=>{
            if(!cropper){
                showError(
                    "Cover Error",
                    "Please crop the cover before continuing."
                );
                return;
            }
            const canvas=cropper.getCroppedCanvas({
                width:900,
                height:1200,
                imageSmoothingQuality:"high"
            });
            if(!canvas){
                showError(
                    "Cover Error",
                    "Unable to crop the selected cover image."
                );
                return;
            }
            canvas.toBlob(blob=>{
                if(!blob){
                    showError(
                        "Cover Error",
                        "Unable to process the cropped cover image."
                    );
                    return;
                }
                croppedCoverFile = new File(
                    [blob],
                    "cover.jpg",
                    {
                        type:"image/jpeg"
                    }
                );
                const previewURL = URL.createObjectURL(blob);
                coverContent.innerHTML = `
                    <img
                        src="${previewURL}"
                        style="
                            width:100%;
                            height:100%;
                            object-fit:cover;
                            border-radius:24px;
                        ">
                `;
                cropModal.classList.add("hidden");
                cropper.destroy();
                cropper = null;
            },"image/jpeg",0.92);
        };
        document.addEventListener("click",e=>{
            if(
                !authorInput.contains(e.target)
                &&
                !authorDropdown.contains(e.target)
            ){
                authorDropdown.classList.remove("open");
                authorInput.parentElement.classList.remove("open");
            }
        });
        document.addEventListener("click",(e)=>{
            if(
                !genreContainer.contains(e.target)
                &&
                !genreDropdown.contains(e.target)
            ){
                genreDropdown.classList.remove("open");

                genreContainer
                    .closest(".author-field")
                    .classList.remove("open");
            }
        });
        document.addEventListener("click",(e)=>{
            if(
                !tagContainer.contains(e.target)
                &&
                !tagDropdown.contains(e.target)
            ){
                tagDropdown.classList.remove("open");
                tagContainer
                    .closest(".author-field")
                    .classList.remove("open");
            }
        });
        function showError(title,message){
            document.getElementById("errorTitle").textContent=title;
            document.getElementById("errorMessage").textContent=message;
            document.getElementById("errorModal").classList.remove("hidden");
        }
        document
        .getElementById("closeErrorModal")
        .onclick=()=>{
            document
                .getElementById("errorModal")
                .classList.add("hidden");
        };
        function validateUpload(){
            const category=document.querySelector("#categoryBtn").closest(".custom-select").dataset.value;
            const bookName=document.getElementById("bookName").value.trim();
            const chapterNumber =
                category === "Book" || category === "Poetry"
                    ? null
                    : parseInt(
                        chapterInput.value || "0",
                        10
                    );
            if(!croppedCoverFile){
                showError(
                    "Missing Cover",
                    "Please upload and crop a book cover"
                );
                return false;
            }
            if(!epubInput.files.length){
                showError(
                    "Missing EPUB",
                    "Please select an EPUB file"
                );
                return false;
            }
            if(
                !document
                    .getElementById("bookName")
                    .value
                    .trim()
            ){
                showError(
                    "Missing Book Name",
                    "Please enter the book name"
                );
                return false;
            }
            if(
                !authorInput.value.trim()
            ){
                showError(
                    "Missing Author",
                    "Please enter the author's name"
                );
                return false;
            }
            if(
                category !== "Book" &&
                category !== "Poetry" &&
                !chapterInput.value.trim()
            ){
                showError(
                    "Missing Chapter Number",
                    "Please enter the latest or last chapter number"
                );
                return false;
            }
            if(
                !document.querySelector("#originBtn")
                    .closest(".custom-select")
                    .dataset.value
            ){
                showError(
                    "Missing Origin",
                    "Please select the book's origin"
                );
                return false;
            }
            if(
                !document.querySelector("#categoryBtn")
                    .closest(".custom-select")
                    .dataset.value
            ){
                showError(
                    "Missing Category",
                    "Please select a category"
                );
                return false;
            }
            if(
                !document.querySelector("#statusBtn")
                    .closest(".custom-select")
                    .dataset.value
            ){
                showError(
                    "Missing Status",
                    "Please select the book status"
                );
                return false;
            }
            if(
                !document.querySelector("#languageBtn")
                    .closest(".custom-select")
                    .dataset.value
            ){
                showError(
                    "Missing Language",
                    "Please select a language"
                );
                return false;
            }
            if(selectedGenres.length===0){
                showError(
                    "Missing Genre",
                    "Please add at least one genre"
                );
                return false;
            }
            if(selectedTags.length===0){
                showError(
                    "Missing Tag",
                    "Please add at least one tag"
                );
                return false;
            }
            const description=document
                .getElementById("description")
                .value
                .trim();
            if(description.length<10){
                showError(
                    "Description Too Short",
                    "Description must contain at least 10 characters"
                );
                return false;
            }
            if(
                category !== "Book" &&
                category !== "Poetry" &&
                (!Number.isInteger(chapterNumber) || chapterNumber <= 0)
            ){
                showError(
                    "Invalid Chapter Number",
                    "Chapter number must be greater than zero"
                );
                return false;
            }
            if(bookName.length>200){
                showError(
                    "Book Name Too Long",
                    "Book name cannot exceed 200 characters"
                );
                return false;
            }
            if(authorInput.value.trim().length>100){
                showError(
                    "Author Name Too Long",
                    "Author name cannot exceed 100 characters"
                );
                return false;
            }
            return true;
        }
        function createBookId(name){
            return name
                .normalize("NFKD")
                .replace(/[\u0300-\u036f]/g,"")
                .toLowerCase()
                .replace(/[^a-z0-9]/g,"");
        }
        const uploadBookBtn=document.getElementById("uploadBookBtn");
        uploadBookBtn.onclick=async()=>{
            if(!validateUpload()){
                return;
            }
            const user=auth.currentUser;
            if(!user){
                showError(
                    "Not Logged In",
                    "Please sign in again before uploading."
                );
                return;
            }
            const coverFile = croppedCoverFile;
            const epubFile = epubInput.files[0];
            if(!coverFile || !epubFile){
                showError(
                    "Missing Files",
                    "Cover and EPUB are required."
                );
                return;
            }
            const bookName=document.getElementById("bookName").value.trim();
            const authorName=document.getElementById("authorName").value.trim();
            const category=document.querySelector("#categoryBtn")
                .closest(".custom-select")
                .dataset.value || "";
            const language=document.querySelector("#languageBtn")
                .closest(".custom-select")
                .dataset.value || "";
            const origin=document.querySelector("#originBtn")
                .closest(".custom-select")
                .dataset.value || "";
            const status=document.querySelector("#statusBtn")
                .closest(".custom-select")
                .dataset.value || "";
            const chapterNumber=parseInt(
                chapterInput.value || "0",
                10
            );
            const description=document
                .getElementById("description")
                .value
                .trim();
            const now=Date.now();
            const formData=new FormData();
            formData.append(
                "cover",
                coverFile,
                coverFile.name
            );
            formData.append(
                "epub",
                epubFile,
                epubFile.name
            );
            formData.append(
                "bookId",
                createBookId(bookName)
            );
            formData.append(
                "bookName",
                bookName
            );
            formData.append(
                "authorName",
                authorName
            );
            formData.append(
                "category",
                category
            );
            formData.append(
                "chapterNumber",
                chapterNumber === null ? "null" : chapterNumber
            );
            formData.append(
                "description",
                description
            );
            formData.append(
                "downloads",
                0
            );
            formData.append(
                "views",
                0
            );
            formData.append(
                "mainGenre",
                selectedGenres[0] || ""
            );
            formData.append(
                "genres",
                JSON.stringify(selectedGenres.slice(1))
            );
            formData.append(
                "alternateTitles",
                JSON.stringify(alternateTitles)
            );
            formData.append(
                "language",
                language
            );
            formData.append(
                "origin",
                origin
            );
            formData.append(
                "status",
                status
            );
            formData.append(
                "tags",
                JSON.stringify(selectedTags)
            );
            formData.append(
                "createdAt",
                now
            );
            formData.append(
                "updatedAt",
                now
            );
            formData.append(
                "uploaderUid",
                user.uid
            );
            setUploadButtonLoading();
            try{
                const token = await user.getIdToken();
                const response=await fetch(
                    "https://immortal-library-backend.onrender.com/upload-epub",
                    {
                        method:"POST",
                        headers:{
                            Authorization:`Bearer ${token}`
                        },
                        body:formData
                    }
                );
                const result=await response.json().catch(()=>({
                    success:false,
                    message:"Invalid server response."
                }));
                if(response.ok && result.success){
                    setUploadButtonSuccess();
                    await new Promise(resolve=>setTimeout(resolve,2000));
                    errorTitle.style.color="var(--gold)";
                    errorTitle.textContent="Upload Complete";
                    errorMessage.textContent=result.message;
                    errorModal.classList.remove("hidden");
                    resetUploadButton();
                }else{
                    resetUploadButton();
                    errorTitle.style.color="#ff6868";
                    errorTitle.textContent="Upload Failed";
                    errorMessage.textContent=
                        result.message || "Upload failed.";
                    errorModal.classList.remove("hidden");
                }
            }catch(err){
                console.error(err);
                resetUploadButton();
                errorTitle.style.color="#ff6868";
                errorTitle.textContent="Upload Failed";
                errorMessage.textContent=
                    err.message || "Unexpected error.";
                errorModal.classList.remove("hidden");
            }
        };
    }
   
    document.addEventListener("click",()=>{
        document.querySelectorAll(".dropdown-menu").forEach(menu=>{
            menu.classList.remove("open");
        });
        document.querySelectorAll(".select-btn").forEach(btn=>{
            btn.classList.remove("open");
        });
    });

    mobileLayout();
    window.addEventListener("resize",mobileLayout);

    mobileHome.onclick=()=>{
        window.location.href="/index";
    };

    closeSidebar.onclick=()=>{
        sidebar.classList.remove("open");
    };

    menuBtn.onclick=()=>{
        if(window.innerWidth<=900){
            sidebar.classList.toggle("open");
        }else{
            window.location.href="/index";
        }
    };

</script>
