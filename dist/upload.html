<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link rel="icon" type="image/x-icon" href="/assets/icon-Ct00HvqH.ico">

<style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    :root{
        --bg:#090909;
        --bg2:#111111;
        --card:#171717;
        --card2:#1d1d1d;
        --gold:#d7b56d;
        --gold2:#f0d28a;
        --text:#ececec;
        --muted:#aaaaaa;
        --border:rgba(255,255,255,.08);
    }

    html{
        scroll-behavior:smooth;
    }

    main{
        margin-top:72px;
        min-height:calc(100vh - 72px);
        padding:70px 0;
        background:url("/assets/bg(upload1)-oFC_92GV.jpg");
        background-size:cover;
        background-position:center;
        background-repeat:no-repeat;
    }

    body{
        visibility:hidden;
        background:#090909;
        color:var(--text);
        font-family:Inter,sans-serif;
    }

    body::before{
        content:"";
        position:fixed;
        inset:0;
        background:
            radial-gradient(circle at top,rgba(255,220,130,.05),transparent 35%),
            radial-gradient(circle at bottom,rgba(255,255,255,.02),transparent 40%);
        pointer-events:none;
        z-index:-2;
    }

    body::after{
        content:"";
        position:fixed;
        inset:0;
        background-image:
            radial-gradient(rgba(255,255,255,.03) 1px,transparent 1px);
        background-size:42px 42px;
        opacity:.25;
        pointer-events:none;
        z-index:-1;
    }

    nav{
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:72px;
        display:flex;
        justify-content:space-between;
        align-items:center;
        padding:0 70px;
        background:rgba(10,10,10,.82);
        backdrop-filter:blur(14px);
        border-bottom:1px solid var(--border);
        z-index:1000;
    }

    .nav-left{
        display:flex;
        gap:16px;
        align-items:center;
    }

    .nav-right{
        display:flex;
        align-items:center;
        gap:16px;
    }

    .nav-btn{
        text-decoration:none;
        color:#d7d7d7;
        padding:11px 22px;
        border-radius:30px;
        transition:.25s;
        font-weight:500;
    }

    .nav-btn:hover{
        transform: translateY(-1px);
    }

    .active{
        background:var(--gold);
        color:black;
    }

    footer{
        padding:70px;
        text-align:center;
        border-top:1px solid rgba(255,255,255,.08);
        color:#888;
    }

    .modal{
        position:fixed;
        inset:0;
        display:flex;
        justify-content:center;
        align-items:center;
        background:rgba(0,0,0,.75);
        backdrop-filter:blur(10px);
        z-index:9999;
    }

    .hidden{
        display:none;
    }

    .modal-card{
        width:420px;
        max-width:90%;
        background:#151515;
        border:1px solid rgba(255,255,255,.08);
        border-radius:20px;
        padding:35px;
        text-align:center;

    .modal-card h2{
        margin-bottom:10px;
    }

    .modal-card p{
        color:#aaa;
        margin-bottom:25px;
    }

        width:100%;
        display:flex;
        align-items:center;
        justify-content:center;
        gap:12px;
        padding:14px;

        color:black;
        border:none;
        border-radius:12px;

        font-size:15px;

        transition:
            background .2s,
            transform .15s,
            box-shadow .2s;

        cursor:not-allowed;
    }

        height:44px;

        background:transparent;

        display:none;
    }

    .nav-right{
        position:relative;
    }

    .profile-menu{
        position:absolute;
        top:75px;
        right:65px; 
        width:260px;
        background:#181818;
        border:1px solid rgba(255,255,255,.08);
        border-radius:16px;
        overflow:hidden;
        box-shadow:0 18px 50px rgba(0,0,0,.45);
        animation:profileMenu .18s ease;
        z-index:10;
    }

    @keyframes profileMenu{
        from{
            opacity:0;
            transform:translateY(-8px);
        }
        to{
            opacity:1;
            transform:none;
        }
    }

    .profile-menu-user{
        width:100%;
        display:flex;
        align-items:center;
        gap:14px;
        padding:16px;
        background:none;
        border:none;
        border-bottom:2px solid rgba(215,181,109,.22);
        text-align:left;
        cursor:pointer;
        transition:background .18s;
    }

    .profile-menu-user:hover{
        background:rgba(255,255,255,.05);
    }

    .profile-menu-user:active{
        transform:scale(.99);
    }

    .profile-menu-avatar{
        width:48px;
        height:48px;
        border-radius:50%;
        object-fit:cover;
    }

    .profile-menu-name{
        font-weight:600;
        color:white;
        overflow:hidden;
        white-space:nowrap;
        text-overflow:ellipsis;
    }

    .profile-menu-role{
        color:#999;
        font-size:13px;
        margin-top:3px;
    }

    .logout-btn{
        width:100%;
        display:flex;
        align-items:center;
        justify-content:space-between;
        padding:16px;
        background:none;
        border:none;
        color:#ff7777;
        cursor:pointer;
        transition:
            background .18s,
            color .18s,
            transform .15s;

    .logout-btn span{
        font-weight:500;
    }

    .logout-btn svg{

        height:18px;

    .logout-btn:hover{

    }

    .logout-btn:active{
        transform:scale(.985);
    }

    .profile-btn{
        transition:
            transform .18s,
            box-shadow .18s,
            border-color .18s;

    .profile-btn:hover{
        border-color:rgba(215,181,109,.55);
        box-shadow:
            0 0 22px rgba(215,181,109,.22);
    }

    .profile-btn:active{
        transform:scale(.94);
    }

    .footer-link{

            opacity .2s,

    .terms-link{

    }

            linear-gradient(

    }

        width:100%;

        border-radius:22px;
        background:
            linear-gradient(
                180deg,
                rgba(22,22,22,.78),

        overflow:hidden;
        background-size:cover;
        background-position:center;

        cursor:pointer;

    .cover-preview:hover{

        content:"📖";
        font-size:58px;

    }

    .cover-preview::after{

        display:flex;

    }

    .details-column input,
    .details-column select,

                rgba(10,16,28,.92),

    .details-column input:focus,
    #tags:focus,
    #description:focus,
    .custom-dropdown.open .dropdown-selected,
    .custom-dropdown:focus .dropdown-selected{
        border-color:#282626;
        box-shadow:
            0 0 0 4px rgba(255,255,255,.08);
    }

    .details-column input::placeholder,
    #tags::placeholder,
    #description::placeholder{

    }

    #tags{
        margin-top:24px;
    }

    #description{
        margin-top:24px;
        min-height:180px;
        max-height:420px;
        line-height:1.75;
        resize:none;
        overflow-y:auto;
        overflow-x:hidden;
        padding-right:14px;
    }

    .upload-btn{
        margin-top:34px;
        width:100%;
        height:60px;
        border:none;
        border-radius:18px;
        background:
            linear-gradient(
                180deg,
                var(--gold2),
                var(--gold)
            );
        color:black;
        font-size:16px;
        font-weight:700;
        letter-spacing:.4px;
        cursor:pointer;
        transition:
            transform .2s,
            box-shadow .2s;
    }

    .upload-btn:hover{
        transform:translateY(-3px);
        box-shadow:
            0 18px 45px rgba(215,181,109,.25);
    }

    .upload-btn:active{
        transform:scale(.985);
    }

    .upload-btn{
        position:relative;
        display:flex;
        align-items:center;
        justify-content:center;
        gap:12px;
    }

    .upload-btn:disabled{
        cursor:not-allowed;
        opacity:.9;
    }

    .upload-loader{
        width:22px;
        height:22px;
        border:3px solid

        border-top-color:black;
        border-radius:50%;

            uploadSpin .8s linear infinite;
    }

    @keyframes uploadSpin{
        to{
            transform:
                rotate(360deg);
        }

    }

    input[type=file]{

    #description::-webkit-scrollbar-thumb:hover{

        background-clip:padding-box;
    }

    #description{

    .epub-picker{
        display:flex;
        align-items:center;
        gap:18px;
        padding:18px;

    .custom-dropdown{
        position:relative;
        width:100%;
        user-select:none;
        outline:none;
    }

    .dropdown-selected{
        width:100%;
        min-height:58px;
        display:flex;
        align-items:center;
        justify-content:space-between;
        padding:18px 20px;
        background:
            linear-gradient(

    .dropdown-menu{

        visibility:hidden;
        transform:

    .custom-dropdown.open .dropdown-menu{

<main>

                for="coverFile">

            <input

        <div
